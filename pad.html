/* ============ 환불 (미반납 / 환불대기 / 환불완료) ============ */
function renderRefund(){
  const R=STATE.refund;
  // 대상: 월납 퇴원 계열 + 신규 퇴원(펜스 삭제대기)
  const list=Object.values(DATA.students).filter(st=>st.status==='퇴원'||st.status==='환불대기'||st.status==='재원(환불완료)'||st.status==='환불완료');
  function refundStatusOf(st){
    // 환불 완료 여부는 refundCompletedDate로 판단 (퇴원 상태여도 환불 끝났으면 환불완료)
    if(st.refundCompletedDate) return '환불완료';
    if(st.status==='환불대기') return '환불대기';
    // 퇴원 - 월납 기준
    const mp=st.pads.find(p=>p.type==='월납'&&!p.archived);
    if(mp){
      const r=mp.returned||{};
      const comps=mp.components||[];
      const items=comps.filter(c=>{
        const name=typeof c==='string'?c:c.name;
        return mp.leased?.[name]!==false;
      });
      if(items.length===0) return '환불대기';
      const allDone=items.every(c=>{
        const name=typeof c==='string'?c:c.name;
        return r[name]?.done||r[name]?.deducted;
      });
      return allDone?'환불대기':'미반납';
    }
    // 환불완료 학생이 퇴원 status로 잘못 남아있어도 목록에서 제외
    if(st.refundCompletedDate) return '환불완료';
    // 신규만 있는 경우 - 펜스는 환불 집계에서 제외 (대시보드 펜스 카드에서만)
    return null;
  }
  let ann=list.map(st=>({st,rs:refundStatusOf(st)})).filter(x=>x.rs!==null);
  if(R.q){const q=R.q.toLowerCase();ann=ann.filter(x=>x.st.name.toLowerCase().includes(q))}
  if(R.cls){ann=ann.filter(x=>(x.st.class||'정규')===R.cls)}
  if(R.status) ann=ann.filter(x=>x.rs===R.status);
  if(R.from||R.to) ann=ann.filter(x=>dateInRange(x.st.tuebanDate,R.from,R.to));
  // 환불완료는 전체 보기 시: 학생 검색/기간 필터 없으면 기본 오늘 처리분만
  if(R.status==='' || !R.status){
    if(!R.q && !R.from && !R.to && !R.cls){
      const today = todayStr();
      ann=ann.filter(x=>x.rs!=='환불완료' || (x.st.refundCompletedDate && x.st.refundCompletedDate===today));
    }
  }
  const order={'환불대기':0,'미반납':1,'환불완료':2};
  // 정렬: completeOld(회수 오래된순) / completeNew / nameAsc / recentDone(최근 처리순)
  // 환불완료 필터일 때 기본은 recentDone, 그 외엔 completeOld
  let sortType = R.sort;
  if(!sortType){
    sortType = R.status==='환불완료' ? 'recentDone' : 'completeOld';
  }
  ann.sort((a,b)=>{
    const d=order[a.rs]-order[b.rs];
    if(d!==0) return d;
    if(sortType==='nameAsc') return (a.st.name||'').localeCompare(b.st.name||'','ko');
    if(sortType==='recentDone'){
      // 환불완료 처리일 최신순 (환불완료 학생만 의미 있음)
      const ra=a.st.refundCompletedDate||'';
      const rb=b.st.refundCompletedDate||'';
      if(ra||rb) return rb.localeCompare(ra);
      // fallback: 회수 완료일
      const ca=a.st.completeDate||a.st.tuebanDate||'';
      const cb=b.st.completeDate||b.st.tuebanDate||'';
      return cb.localeCompare(ca);
    }
    if(sortType==='completeNew'){
      const ca=a.st.completeDate||a.st.tuebanDate||'';
      const cb=b.st.completeDate||b.st.tuebanDate||'';
      return cb.localeCompare(ca);
    }
    // completeOld (기본): 회수 완료일 오래된 순 (오래 기다린 사람부터)
    const ca=a.st.completeDate||a.st.tuebanDate||'';
    const cb=b.st.completeDate||b.st.tuebanDate||'';
    return ca.localeCompare(cb);
  });
  const show=ann.slice(0,R.limit);
  const counts={'환불대기':0,'미반납':0,'환불완료':0};
  ann.forEach(x=>counts[x.rs]++);
  const classes = getAllClasses();
  // 방금 처리한 학생 (lastProcessed) 표시용
  const lastSid = STATE.refund.lastProcessed;
  const lastSt = lastSid ? DATA.students[lastSid] : null;
  const isDefaultView = !R.status && !R.q && !R.from && !R.to && !R.cls;
  return `
    <div class="page-header">
      <div><div class="page-title">환불 <span class="inline-stats">환불대기 ${counts['환불대기']} · 퇴원 미반납 ${counts['미반납']}</span></div></div>
    </div>
    ${lastSt?`<div style="background:#dcfce7;border:1px solid #86efac;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:13px">
      <span>✓ 방금 처리: <b>${lastSt.name}</b>${classBadge(lastSt)} → <b>환불완료</b> ${lastSt.refundCompletedDate?'('+lastSt.refundCompletedDate+')':''}</span>
      <button class="btn btn-sm" onclick="STATE.refund.lastProcessed=null;showPage('refund')">닫기</button>
    </div>`:''}
    ${isDefaultView?'<div style="background:#fef3c7;border:1px solid #fbbf24;padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:12px;color:#92400e">기본 화면: <b>환불대기·미반납 전체 + 오늘 환불완료분</b>만 표시. 과거 환불완료는 [상태=환불완료] 또는 기간 필터로 조회</div>':''}
    <div class="summary-row">
      <div class="summary-item warn"><b>${counts['환불대기']}</b>환불대기</div>
      <div class="summary-item danger"><b>${counts['미반납']}</b>퇴원 미반납</div>
      <div class="summary-item muted"><b>${counts['환불완료']}</b>환불완료</div>
    </div>
    <div class="filter-bar" style="grid-template-columns:1.2fr 0.8fr 0.9fr 1.2fr 0.8fr 0.8fr auto">
      <div class="filter-field"><label>학생 검색</label><input value="${R.q||''}" placeholder="학생명" oninput="STATE.refund.q=this.value;_debouncedShowPage('refund')"></div>
      <div class="filter-field"><label>반</label><select onchange="STATE.refund.cls=this.value;showPage('refund')"><option value="" ${!R.cls?'selected':''}>전체</option>${classes.map(c=>`<option value="${c}" ${R.cls===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="filter-field"><label>상태</label><select onchange="STATE.refund.status=this.value;STATE.refund.sort='';showPage('refund')"><option value="" ${!R.status?'selected':''}>전체</option><option value="환불대기" ${R.status==='환불대기'?'selected':''}>환불대기</option><option value="미반납" ${R.status==='미반납'?'selected':''}>퇴원 미반납</option><option value="환불완료" ${R.status==='환불완료'?'selected':''}>환불완료</option></select></div>
      <div class="filter-field"><label>정렬</label><select onchange="STATE.refund.sort=this.value;showPage('refund')"><option value="completeOld" ${sortType==='completeOld'?'selected':''}>회수순</option><option value="nameAsc" ${sortType==='nameAsc'?'selected':''}>이름순</option><option value="recentDone" ${sortType==='recentDone'?'selected':''}>퇴반순</option></select></div>
      <div class="filter-field"><label>from</label><input type="date" value="${R.from||''}" onchange="STATE.refund.from=this.value;showPage('refund')"></div>
      <div class="filter-field"><label>to</label><input type="date" value="${R.to||''}" onchange="STATE.refund.to=this.value;showPage('refund')"></div>
      <div class="filter-field"><label>&nbsp;</label><button class="btn btn-excel btn-sm" onclick="dlRefund()">엑셀</button></div>
    </div>
    <table class="tbl"><thead><tr><th>상태</th><th>학생</th><th>퇴원일 (담당)</th><th>패드</th><th>회수 상세</th><th>환불 처리 (담당)</th><th>작업</th></tr></thead><tbody>
      ${show.length?show.map(x=>{
        const st=x.st;const rs=x.rs;
        const p=st.pads.find(pp=>pp.type==='월납')||st.pads.find(pp=>pp.type==='신규');
        const r=p?.returned;const comps=p?.components||[];
        let recovDetail='—';
        if(r&&comps.length){
          recovDetail='<div class="actor-list">'+comps.filter(c=>p.leased?.[c]).map(c=>{const v=r[c]||{};const s=v.done?'<span class="badge badge-green">반납</span>':v.deducted?'<span class="badge badge-yellow">차감</span>':'<span class="badge badge-red">미</span>';return `<div class="line"><b>${c}</b>${s}${v.by?'<span>'+v.by+'</span>':''}</div>`}).join('')+'</div>';
          const notLeased=comps.filter(c=>p.leased&&p.leased[c]===false);
          if(notLeased.length) recovDetail+=`<div style="font-size:10px;color:var(--text-light);margin-top:4px">미대여: ${notLeased.join(', ')}${p.leaseMemo?' ('+p.leaseMemo+')':''}</div>`;
        }
        const refundInfo = st.refundCompletedDate
          ? `${st.refundCompletedDate}<br><span style="font-size:11px;color:var(--text-muted)">${st.refundCompletedBy||'—'}</span>`
          : '<span style="font-size:11px;color:var(--text-light)">—</span>';
        return `<tr>
          <td><span class="badge badge-${rs==='환불대기'?'yellow':rs==='미반납'?'red':'gray'}">${rs==='미반납'?'퇴원 미반납':rs==='환불완료'?'환불완료':rs}</span></td>
          <td><span class="clickable" onclick="openStudentModal('${st.id}')">${st.name}</span>${classBadge(st)}</td>
          <td>${st.tuebanDate||'—'}<br><span style="font-size:11px;color:var(--text-muted)">${st.tuebanBy||'—'}</span></td>

            ${rs==='환불대기'&&canClickRefund()?`<button class="btn btn-sm btn-primary" onclick="refund_process('${st.id}')">환불 요청</button>`:''}
            ${rs==='환불대기'&&!canClickRefund()?'<span style="font-size:11px;color:var(--text-muted)">스타터만 가능</span>':''}
            ${rs==='미반납'&&p?.type==='월납'?`<button class="btn btn-sm" onclick="openTuebanReturnModal('${st.id}','${p.num}')">반납 리스트</button>`:''}
          </td>
        </tr>`}).join(''):'<tr><td colspan="7" class="tbl-empty">없음</td></tr>'}
    </tbody></table>
    ${ann.length>R.limit?`<div class="load-more-wrap">총 ${ann.length}건 중 ${show.length}건<br><button class="btn" onclick="STATE.refund.limit+=20;showPage('refund')">더 보기</button></div>`:''}`;
}
function canClickRefund(){return currentDept==='스타터'||currentRole==='어드민'}
function refund_process(sid){
  const st=DATA.students[sid];
  if(!st){toast('학생 없음','error');return}
  const p=st.pads.find(pp=>pp.type==='월납'&&!pp.archived)||st.pads.find(pp=>pp.type==='신규'&&!pp.archived)||st.pads[0];
  ask('환불 요청',
    `<div style="padding:8px 0">
      <div style="font-size:15px;margin-bottom:10px"><b>${st.name}</b> 학생의 환불을 완료 처리합니다.</div>
      <div style="background:#fef3c7;border:1px solid #fbbf24;padding:10px;border-radius:6px;font-size:13px;line-height:1.6">
        ${p?.type==='월납'?'• 월납 패드 <b>'+p.num+'</b>: 이미 창고에 있음 (반납 완료 시 이동됨)<br>• 학생 상태: 환불대기 → <b>퇴원완료(환불완료)</b>':p?.type==='신규'?'• 신규 학생이므로 환불완료 처리<br>• 펜스는 이미 삭제대기 상태':'• 환불완료로 이동'}
      </div>
    </div>`,
    '환불 완료','primary',()=>{
    const refundDate=todayStr();
    // 퇴원 상태 유지 + 환불 완료 메타 기록 (학생카드용 함수와 동일)
    st.status='퇴원';
    st.refundCompletedDate=refundDate;
    st.refundCompletedBy=currentUser;
    // 월납 패드 archived 플래그 처리 (이미 창고에 있음)
    st.pads.forEach(pp=>{
      if(pp.type==='월납'&&DATA.pads[pp.num]){
        // 아직 창고에 안 들어가있으면 이동
        if(DATA.pads[pp.num].status==='환불대기'){
          DATA.pads[pp.num].status='창고';
          delete DATA.pads[pp.num].studentId;
          delete DATA.pads[pp.num].tuebanDate;
        }
        pp.archived=true;
        pp.archivedStage='환불완료';
        pp.refundCompletedDate=refundDate;
        pp.refundCompletedBy=currentUser;
        pp.tuebanDate=st.tuebanDate;
        pp.tuebanBy=st.tuebanBy;
        pp.completeDate=st.completeDate;
      } else if(pp.type==='신규'&&!pp.archived){
        // 신규는 패드 자체를 학생이 가져감 - archived 플래그만
        pp.archived=true;
        pp.archivedStage='환불완료';
        pp.refundCompletedDate=refundDate;
        pp.refundCompletedBy=currentUser;
      }
    });
    addHistory('환불','완료',`${st.name} · 환불 완료 처리`,sid,p?.num||null);
    // 방금 처리한 학생 기록 (상단 표시용)
    STATE.refund.lastProcessed = sid;
    toast(`✓ ${st.name} 환불 완료 — 퇴원완료(환불완료)`,'success');
    showPage('refund');
  });
}
/* 환불 상태 판별 (전역 - dlRefund 등에서도 사용) */
function getRefundStatus(st){
  if(st.refundCompletedDate) return '환불완료';
  if(st.status==='환불대기') return '환불대기';
  const mp=st.pads.find(p=>p.type==='월납'&&!p.archived);
  if(mp){
    const r=mp.returned||{};
    const comps=mp.components||[];
    const items=comps.filter(c=>{
      const name=typeof c==='string'?c:c.name;
      return mp.leased?.[name]!==false;
    });
    if(items.length===0) return '환불대기';
    const allDone=items.every(c=>{
      const name=typeof c==='string'?c:c.name;
      return r[name]?.done||r[name]?.deducted;
    });
    return allDone?'환불대기':'미반납';
  }
  return null;
}
function dlRefund(){
  const R=STATE.refund;
  // 화면과 동일한 필터링
  const list=Object.values(DATA.students).filter(st=>st.status==='퇴원'||st.status==='환불대기'||st.status==='재원(환불완료)'||st.status==='환불완료');
  let ann=list.map(st=>({st,rs:getRefundStatus(st)})).filter(x=>x.rs!==null);
  if(R.q){const q=R.q.toLowerCase();ann=ann.filter(x=>x.st.name.toLowerCase().includes(q))}
  if(R.cls){ann=ann.filter(x=>(x.st.class||'정규')===R.cls)}
  if(R.status) ann=ann.filter(x=>x.rs===R.status);
  if(R.from||R.to) ann=ann.filter(x=>dateInRange(x.st.tuebanDate,R.from,R.to));
  // 전체 보기 시 환불완료는 오늘만 (화면과 동일)
  if(R.status==='' || !R.status){
    if(!R.q && !R.from && !R.to && !R.cls){
      const today = todayStr();
      ann=ann.filter(x=>x.rs!=='환불완료' || (x.st.refundCompletedDate && x.st.refundCompletedDate===today));
    }
  }
  const rows=[['상태','학생','반','퇴원일','퇴원담당','패드','완료일','환불완료일']];
  ann.forEach(x=>{
    const st=x.st;
    const p=(st.pads||[])[0]||{};
    rows.push([x.rs, st.name, st.class||'정규', st.tuebanDate||'', st.tuebanBy||'', p.num||'', st.completeDate||'', st.refundCompletedDate||'']);
  });
  downloadCSV('환불현황_'+todayStr()+'.csv',rows);
}

/* 반 관리 - 추가/이름수정/삭제 */
function renderSetClassMgmt(){
  const list = (DATA._classes || ['정규']).slice();
  // "처리 중" 학생만 카운트 (재원 + 퇴원미반납 + 환불대기, 환불완료 제외)
  const counts = {};
  Object.values(DATA.students||{}).forEach(s=>{
    // 환불완료(이력) 제외 — refundCompletedDate가 있으면 환불완료
    if(s.refundCompletedDate) return;
    const c = s.class || '(미지정)';
    counts[c] = (counts[c]||0) + 1;
  });
  const canManage = currentDept==='어드민' || currentRole==='관리자' || currentDept==='교무';
  return `
    <div class="box" style="margin-bottom:16px">
      <div class="box-title">반 관리</div>
      <div class="box-hint">
        반 추가 → 학생 일괄 이동 → 빈 반 삭제 순으로 작업합니다.<br>
        엑셀 업로드 시 여기 등록된 반만 허용 (윈터/윈터스쿨 같은 중복 방지).<br>
        <b>인원 = 재원 + 퇴원미반납 + 환불대기</b> (환불완료 제외, 처리 중인 학생만).<br>
        <b>이동/삭제 시 안전 확인을 거칩니다.</b>
      </div>
      <table class="tbl" style="margin-top:12px"><thead><tr><th>반 이름</th><th>인원</th><th>작업</th></tr></thead><tbody>
        ${list.map(c=>{
          const cnt = counts[c]||0;
          return `<tr>
            <td><b>${c}</b></td>
            <td>${cnt>0?`<span class="clickable" onclick="cls_gotoStudents('${c}')" style="font-weight:700;color:var(--primary)">${cnt}명</span>`:'<span style="color:var(--text-muted)">0명</span>'}</td>
            <td>
              ${canManage?`
                <button class="btn btn-sm" onclick="cls_openMove('${c}')" ${cnt===0?'disabled title="학생 없음"':''}>학생 이동</button>
                <button class="btn btn-sm btn-danger" onclick="cls_delete('${c}')" ${cnt>0?'disabled title="학생 있음"':''}>삭제</button>
              `:'<span style="font-size:11px;color:var(--text-muted)">권한 없음</span>'}
            </td>
          </tr>`;
        }).join('')}
      </tbody></table>
    </div>
    ${canManage?`
    <div class="box">
      <div class="box-title">+ 반 추가</div>
      <div class="form-row">
        <label>새 반 이름</label>
        <input id="cls_newName" placeholder="예: 봄특강, 여름캠프">
        <div class="form-hint">중복 불가, 띄어쓰기 주의 (윈터/윈터 다르면 다른 반)</div>
      </div>
      <button class="btn btn-primary" onclick="cls_add()">+ 추가</button>
    </div>`:''}
  `;
}
// 반 클릭 시 학생 검색 페이지로 이동 (해당 반 + 처리중 = 재원+대기)
function cls_gotoStudents(cls){
  STATE.search.q='';

function cls_add(){
  const name = (document.getElementById('cls_newName').value||'').trim();

  DATA._classes.push(name);
  addHistory('설정','반추가',name+' 추가',null,null);

/* 학생 이동 — 다른 반으로 일괄 이동 (안전 입력 확인 포함) */
function cls_openMove(fromCls){
  // 처리 중 학생만 (환불완료 제외)
  const inProgress = Object.values(DATA.students).filter(s=>(s.class||'정규')===fromCls && !s.refundCompletedDate);
  const archived = Object.values(DATA.students).filter(s=>(s.class||'정규')===fromCls && s.refundCompletedDate);
  if(inProgress.length===0){toast('이동할 학생 없음 (처리 중인 학생 없음)','error');return}
  const others = (DATA._classes||[]).filter(c=>c!==fromCls);
  if(others.length===0){toast('이동할 다른 반이 없음. 반을 먼저 추가하세요','error');return}
  openModal(`
    <div class="modal-title">학생 일괄 이동 — ${fromCls}</div>
    <div class="modal-desc"><b>${fromCls}</b> 반의 처리 중 학생 <b>${inProgress.length}명</b>을 다른 반으로 이동합니다.${archived.length?`<br><span style="font-size:12px;color:var(--text-muted)">(환불완료 ${archived.length}명은 이력 보존을 위해 ${fromCls}에 그대로 유지)</span>`:''}</div>
    <div class="form-row">
      <label>이동할 반<span class="req">*</span></label>
      <select id="cls_mv_to">
        ${others.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
      <div class="form-hint">새 반은 먼저 [+ 반 추가]에서 만든 후 선택하세요</div>
    </div>
    <div id="cls_mv_box" style="background:#fef2f2;border:2px solid #dc2626;padding:12px;border-radius:6px;margin-bottom:14px;transition:all 0.2s">
      <div id="cls_mv_title" style="font-size:13px;color:#991b1b;font-weight:700;margin-bottom:8px">⚠️ 안전 확인</div>
      <div id="cls_mv_desc" style="font-size:12px;color:#7f1d1d;line-height:1.6;margin-bottom:8px">
        ${inProgress.length}명의 학생 반이 모두 변경됩니다. 실수 방지를 위해 아래에 <b>"이동"</b> 두 글자를 입력하세요.
      </div>
      <input id="cls_mv_confirm" placeholder="이동 (정확히 두 글자)" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:14px;font-family:inherit" oninput="cls_mv_checkInput()">
    </div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button id="cls_mv_btn" class="btn" disabled style="opacity:0.5;cursor:not-allowed" onclick="cls_doMove('${fromCls}')">이동 실행</button></div>
  `);
}
// 안전 확인 입력 시 시각 피드백
function cls_mv_checkInput(){
  const val = (document.getElementById('cls_mv_confirm').value||'').trim();
  const box = document.getElementById('cls_mv_box');
  const title = document.getElementById('cls_mv_title');
  const desc = document.getElementById('cls_mv_desc');
  const btn = document.getElementById('cls_mv_btn');
  if(val === '이동'){
    box.style.background = '#dcfce7';
    box.style.borderColor = '#16a34a';
    title.innerHTML = '✓ 안전 확인 완료';
    title.style.color = '#15803d';
    desc.innerHTML = '"이동" 입력 확인됨. <b>이동 실행</b> 버튼을 클릭하세요.';
    desc.style.color = '#166534';
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
    btn.classList.remove('btn');
    btn.classList.add('btn','btn-danger');
  } else {
    box.style.background = '#fef2f2';
    box.style.borderColor = '#dc2626';
    title.innerHTML = '⚠️ 안전 확인';
    title.style.color = '#991b1b';
    desc.style.color = '#7f1d1d';
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.cursor = 'not-allowed';
    btn.classList.remove('btn-danger');
  }
}

function cls_doMove(fromCls){
  const toCls = document.getElementById('cls_mv_to').value;
  const confirm = document.getElementById('cls_mv_confirm').value.trim();
  if(!toCls){toast('이동할 반 선택','error');return}
  if(confirm !== '이동'){toast('"이동"을 정확히 입력하세요','error');return}
  // 처리 중만 이동 (환불완료는 이력 보존)
  const affected = Object.values(DATA.students).filter(s=>(s.class||'정규')===fromCls && !s.refundCompletedDate);
  affected.forEach(s=>{ s.class = toCls; });
  addHistory('설정','반이동',`${fromCls} → ${toCls} (${affected.length}명 일괄, 환불완료 제외)`,null,null);
  closeModal();
  toast(`✓ ${affected.length}명 이동: ${fromCls} → ${toCls}`,'success');
  showPage('settings');
}

function cls_delete(name){
  // 처리 중 학생만 카운트 (환불완료 제외 — 이력은 그대로)
  const cnt = Object.values(DATA.students).filter(s=>(s.class||'정규')===name && !s.refundCompletedDate).length;
  if(cnt>0){toast(`이 반에 처리 중 학생 ${cnt}명 있음. 먼저 다른 반으로 이동하세요`,'error');return}
  // 환불완료 이력 학생들 확인
  const archivedCnt = Object.values(DATA.students).filter(s=>(s.class||'정규')===name && s.refundCompletedDate).length;
  ask('반 삭제',`반 <b>${name}</b>을(를) 삭제하시겠습니까?<br>(처리 중 학생 0명이라 안전합니다)${archivedCnt?`<br><span style="font-size:12px;color:var(--text-muted)">환불완료 이력 ${archivedCnt}명은 ${name}으로 기록 유지됩니다.</span>`:''}`,'삭제','danger',()=>{
    DATA._classes = (DATA._classes||[]).filter(c=>c!==name);
    addHistory('설정','반삭제',name+' 삭제',null,null);
    toast(`반 "${name}" 삭제됨`,'success');
    showPage('settings');
  });
}

function addFreeFenceSingle(){
  const type=document.getElementById('fa_type_1').value;
  const prev=document.getElementById('fa_prev_1').value.trim();
  const key='_free_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);

    num:key, type, status:'미지정',
    prevNum:prev||'',
    deletedDate:todayStr(), deletedBy:currentUser
  };
  addHistory('펜스','여유추가',`${type} 여유 펜스 1개 추가${prev?' (이전 '+prev+')':''}`,null,null);

function addFreeFenceBulk(){
  const type=document.getElementById('fa_type_bulk').value;
  const prevText=document.getElementById('fa_prev_bulk').value.trim();
  const count=parseInt(document.getElementById('fa_count_bulk').value)||0;

  let prevList=[];
  if(prevText){
    prevList=prevText.split(/[,、\s]+/).map(s=>s.trim()).filter(s=>s);
  }
  const total=prevList.length||count;
  if(total<=0){toast('이전 번호 목록 또는 개수 입력','error');return}

  for(let i=0;i<total;i++){
    const key='_free_'+Date.now()+'_'+i+'_'+Math.random().toString(36).slice(2,6);
    DATA.fences[key]={
      num:key, type, status:'미지정',
      prevNum:prevList[i]||'',
      deletedDate:todayStr(), deletedBy:currentUser
    };
  }
  addHistory('펜스','여유일괄추가',`${type} 여유 펜스 ${total}개 추가`,null,null);
  toast(`여유 펜스 ${total}개 추가됨`,'success');
  showPage('settings');
}

/* 데이터 진단 */
function runDiagnostic(){
  const lines = [];
  let issueCount = 0;
  const searchEl = document.getElementById('diag_search');
  const q = searchEl ? searchEl.value.trim() : '';
  lines.push('<div style="font-size:13px;line-height:2">');

  // 검색어 있으면 개별 검색 모드
  if(q){
    // 학생 검색
    const matchStudents = Object.values(DATA.students).filter(function(s){
      return s.name&&s.name.includes(q);
    });
    // 패드 검색
    const matchPads = Object.values(DATA.pads).filter(function(p){
      return p.num&&String(p.num).includes(q);
    });

    if(matchStudents.length===0 && matchPads.length===0){
      lines.push('<div style="color:orange;padding:8px">\'' + q + '\' 검색 결과 없음</div>');
    }

    matchStudents.forEach(function(st){
      lines.push('<div style="background:#f0fff4;padding:10px 12px;border-radius:6px;margin-bottom:8px">');
      lines.push('<b>👤 '+st.name+'</b> · 상태: <b>'+st.status+'</b>');
      if(st.refundCompletedDate) lines.push(' · 환불완료일: '+st.refundCompletedDate);
      lines.push('<br>');
      (st.pads||[]).forEach(function(p){
        const gp = DATA.pads[p.num];
        const padState = p.archived ? '보관('+p.archivedStage+')' : '활성';
        const fenceState = gp&&gp.fenceNum ? gp.fenceNum : '없음';
        const gpState = gp ? gp.status : '패드데이터없음';
        lines.push('└ '+p.type+' '+p.num+' | '+padState+' | 재고상태: '+gpState+' | 펜스: '+fenceState+'<br>');
        if(p.type==='월납'&&!p.archived&&gp&&!gp.fenceNum){
          lines.push('<span style="color:red;padding-left:16px">⚠ 펜스 없음 — 매칭 필요</span><br>');
          issueCount++;
        }
      });
      lines.push('</div>');
    });

    matchPads.forEach(function(p){
      const fence = DATA.fences[p.fenceNum||p.num];
      lines.push('<div style="background:#f0f4ff;padding:10px 12px;border-radius:6px;margin-bottom:8px">');
      lines.push('<b>📦 패드 '+p.num+'</b> · 기종: '+(p.model||'?')+' · 종류: '+p.type+' · 재고상태: <b>'+p.status+'</b><br>');
      lines.push('학생: '+(p.studentId||'없음')+'<br>');
      lines.push('펜스: '+(p.fenceNum?'<b style="color:green">'+p.fenceNum+'</b> ('+(fence?fence.status:'펜스데이터없음')+')':'<b style="color:red">없음</b>'));
      if(!p.fenceNum && p.type==='월납'){
        lines.push(' <button class="btn btn-sm btn-primary" style="margin-left:8px" onclick="fixMonthlyFence(this.dataset.num)" data-num="'+p.num+'">펜스 매칭</button>');
        issueCount++;
      }
      lines.push('</div>');
    });

    lines.push('<div style="margin-top:8px;padding:8px 12px;border-radius:6px;background:'+(issueCount===0?'#f0fff4':'#fff0f0')+';border:1px solid '+(issueCount===0?'#86efac':'#fca5a5')+'">'
      +'<b>'+(issueCount===0?'✅ 이상 없음':'⚠ 이상 '+issueCount+'건')+'</b></div>');
    lines.push('</div>');
    const el = document.getElementById('diag_result');
    if(el) el.innerHTML = lines.join('');
    return;
  }

  // 전체 진단 모드
  // 1. 월납 펜스 미매칭 전체 (창고/환불대기 상태인데 펜스 없는 것)
  const monthlyNoFence = Object.values(DATA.pads).filter(function(p){return p.type==='월납'&&(p.status==='창고'||p.status==='환불대기')&&!p.fenceNum;});
  if(monthlyNoFence.length>0){
    const padList = monthlyNoFence.map(function(p){return p.num+' ('+p.status+')'}).join(', ');
    const btnHtml = monthlyNoFence.map(function(p){
      return '<button class="btn btn-sm btn-primary" style="margin:2px" onclick="fixMonthlyFence(this.dataset.num)" data-num="'+p.num+'">'+p.num+' 펜스 매칭</button>';
    }).join('');
    lines.push('<div style="background:#fff7ed;padding:8px 12px;border-radius:6px;margin-bottom:8px">'
      +'<b>⚠ 월납 펜스 없는 패드 ('+monthlyNoFence.length+'대) — 배부 전 매칭 필요</b><br>'
      +padList+'<br><div style="margin-top:8px">'+btnHtml+'</div>'
      +'</div>');
    issueCount += monthlyNoFence.length;
  } else {
    lines.push('<div style="color:green;margin-bottom:4px">✅ 월납 펜스 이상 없음</div>');
  }

  // 2. 환불완료인데 상태 불일치인 학생
  const statusMismatch = Object.values(DATA.students).filter(function(s){return s.refundCompletedDate&&s.status==='환불대기';});
  if(statusMismatch.length>0){
    lines.push('<div style="background:#fff0f0;padding:8px 12px;border-radius:6px;margin-bottom:8px">'
      +'<b>⚠ 환불완료인데 상태가 환불대기로 남은 학생 ('+statusMismatch.length+'명)</b><br>'
      +statusMismatch.map(function(s){return s.name;}).join(', ')
      +'</div>');
    issueCount += statusMismatch.length;
  } else {
    lines.push('<div style="color:green;margin-bottom:4px">✅ 환불 상태 이상 없음</div>');
  }

  // 3. 퇴원미반납 카운트 vs 실제 목록 불일치
  const calcUnreturned = Object.values(DATA.students).filter(function(s){return isStudentUnreturned(s);});
  const padUnreturned = Object.values(DATA.pads).filter(function(p){return p.status==='퇴원미반납';});
  if(calcUnreturned.length !== padUnreturned.length){
    lines.push('<div style="background:#fff0f0;padding:8px 12px;border-radius:6px;margin-bottom:8px">'
      +'<b>⚠ 퇴원미반납 불일치</b><br>'
      +'학생 기준: '+calcUnreturned.length+'명 / 패드 기준: '+padUnreturned.length+'대<br>'
      +'학생: '+calcUnreturned.map(function(s){return s.name;}).join(', ')
      +'</div>');
    issueCount++;
  } else {
    lines.push('<div style="color:green;margin-bottom:4px">✅ 퇴원미반납 수치 일치 ('+calcUnreturned.length+'건)</div>');
  }

  // 4. 대여중인데 학생 없는 패드
  const orphanPads = Object.values(DATA.pads).filter(function(p){return (p.status==='대여중'||p.status==='배부')&&!p.studentId;});
  if(orphanPads.length>0){
    lines.push('<div style="background:#fff0f0;padding:8px 12px;border-radius:6px;margin-bottom:8px">'
      +'<b>⚠ 대여중인데 학생 없는 패드 ('+orphanPads.length+'대)</b><br>'
      +orphanPads.map(function(p){return p.num+'('+p.type+')'}).join(', ')
      +'</div>');
    issueCount += orphanPads.length;
  } else {
    lines.push('<div style="color:green;margin-bottom:4px">✅ 대여중 패드 학생 연결 이상 없음</div>');
  }

  lines.push('<div style="margin-top:12px;padding:10px;border-radius:6px;background:'+(issueCount===0?'#f0fff4':'#fff0f0')+';border:1px solid '+(issueCount===0?'#86efac':'#fca5a5')+'">'
    +'<b>'+(issueCount===0?'✅ 전체 이상 없음':'⚠ 이상 '+issueCount+'건 발견')+'</b></div>');
  lines.push('</div>');

  const el = document.getElementById('diag_result');
  if(el) el.innerHTML = lines.join('');
}

function updateResetBtn(){
  const val=document.getElementById('reset_confirm').value.trim();
  const btn=document.getElementById('reset_btn');
  if(val==='초기화'){
    btn.disabled=false;
    btn.style.opacity='1';
    btn.style.cursor='pointer';
  } else {
    btn.disabled=true;
    btn.style.opacity='0.5';
    btn.style.cursor='not-allowed';
  }
}

function doFullReset(){

function intake_onTypeChange(){

    if(fenceInput){fenceInput.disabled=false; fenceInput.placeholder='비우면 패드번호와 동일'}
  }

function intake_onStaffChange(){
  const checked=document.getElementById('intake_staff').checked;
  const fenceInput=document.getElementById('intake_fence');
  if(checked){
    fenceInput.value='';
    fenceInput.disabled=true;
    fenceInput.placeholder='(직원용은 펜스 없음)';
  } else {
    fenceInput.disabled=false;
    fenceInput.placeholder='비우면 패드번호와 동일';
  }
}

function intakeSave(){
  const num=document.getElementById('intake_num').value.trim();
  const type=document.getElementById('intake_type').value;
  const model=document.getElementById('intake_model').value;
  const isStaff = type==='무료' && document.getElementById('intake_staff')?.checked;
  const fence=isStaff ? '' : (document.getElementById('intake_fence').value.trim()||num);
  if(!num){toast('패드번호 필수','error');return}
  if(DATA.pads[num]){toast(num+' 이미 존재','error');return}
  const before=Object.values(DATA.pads).filter(p=>p.type===type).length;
  // 상태: 무료+직원용 → 직원사용, 무료 일반 → 보관, 그 외 → 창고
  const defaultStatus = isStaff ? '직원사용' : (type==='무료'?'보관':'창고');
  DATA.pads[num]={num,type,model,status:defaultStatus,intakeDate:todayStr(),intakeBy:currentUser};
  if(!isStaff){
    DATA.pads[num].fenceNum=fence;
    if(type!=='무료'&&!DATA.fences[fence]){
      DATA.fences[fence]={num:fence,type,status:'미지정',padNum:num};
    }
  }
  const after=Object.values(DATA.pads).filter(p=>p.type===type).length;
  addHistory('입고','등록',`${num} (${type}·${model}${isStaff?'·직원용':''}) · ${type} 총 ${before}→${after}대`,null,num);
  document.getElementById('intake_result').innerHTML=`<div class="box box-ok" style="margin-top:14px"><b>✓ ${num} 입고 완료</b><br>
    <span style="font-size:13px">${type} 재고: <b style="color:var(--text-muted)">${before}대</b> → <b style="color:var(--success);font-size:16px">${after}대</b> (+1)</span><br>
    <span style="font-size:12px;color:var(--text-muted)">${defaultStatus} 상태로 등록됨${isStaff?' (펜스 없음 · 직원 업무용)':type!=='무료'?` · 펜스 ${fence} 미지정 등록`:' (무료는 펜스 없음)'}</span>
  </div>`;
  toast(`${num} 입고 · ${type} ${before}→${after}대`,'success');
  setTimeout(()=>{
    const n=document.getElementById('intake_num');if(n)n.value='';
    const f=document.getElementById('intake_fence');if(f){f.value='';f.disabled=false}
    const s=document.getElementById('intake_staff');if(s)s.checked=false;
  },100);
}

function intakeUpload(){
  const f=document.getElementById('intake_file').files[0];
  if(!f){toast('파일 선택','error');return}
  const rd=new FileReader();
  rd.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<=1){toast('데이터 없음','error');return}
    // 입고 전 수치
    const before={신규:Object.values(DATA.pads).filter(p=>p.type==='신규').length,월납:Object.values(DATA.pads).filter(p=>p.type==='월납').length,무료:Object.values(DATA.pads).filter(p=>p.type==='무료').length};
    let ok=0,errs=[];
    const added={신규:0,월납:0,무료:0};
    lines.slice(1).forEach((ln,idx)=>{
      const [num,fence,type,model]=ln.split(',').map(x=>x?.replace(/^"|"$/g,'').trim()||'');
      if(!num) return;
      if(DATA.pads[num]){errs.push(`${idx+2}행: ${num} 이미 존재`);return}
      if(!['신규','월납','무료'].includes(type)){errs.push(`${idx+2}행: 종류 오류 (${type})`);return}
      if(!MODELS[model]){errs.push(`${idx+2}행: 알 수 없는 기종 (${model})`);return}
      const fnum=fence||num;
      const status=type==='무료'?'보관':'창고';
      DATA.pads[num]={num,type,model,status,fenceNum:fnum,intakeDate:todayStr(),intakeBy:currentUser};
      if(type!=='무료'&&!DATA.fences[fnum]){
        DATA.fences[fnum]={num:fnum,type,status:'미지정',padNum:num};
      }
      added[type]++;
      ok++;
    });
    const after={신규:before.신규+added.신규,월납:before.월납+added.월납,무료:before.무료+added.무료};
    addHistory('입고','엑셀',`${ok}건 일괄 입고 (신규+${added.신규}, 월납+${added.월납}, 무료+${added.무료})`,null,null);
    let html=`<div class="box ${errs.length?'box-warn':'box-ok'}" style="margin-top:14px">
      <div style="font-weight:700;font-size:15px;margin-bottom:10px">✓ 입고 완료 ${ok}건${errs.length?' · 오류 '+errs.length+'건':''}</div>
      <table style="width:100%;font-size:13px"><thead><tr style="background:#eee;text-align:left"><th style="padding:6px">종류</th><th style="padding:6px">입고 전</th><th style="padding:6px">입고 후</th><th style="padding:6px">증가</th></tr></thead><tbody>`;
    ['신규','월납','무료'].forEach(t=>{
      if(added[t]>0) html+=`<tr><td style="padding:6px"><b>${t}</b></td><td style="padding:6px">${before[t]}대</td><td style="padding:6px;color:var(--success);font-weight:700">${after[t]}대</td><td style="padding:6px;color:var(--success)">+${added[t]}</td></tr>`;
    });
    html+='</tbody></table>';
    if(errs.length) html+=`<div style="font-size:12px;color:var(--danger);margin-top:12px;border-top:1px solid #ddd;padding-top:10px">오류:<br>${errs.slice(0,10).join('<br>')}${errs.length>10?'<br>...외 '+(errs.length-10)+'건':''}</div>`;
    html+='</div>';
    document.getElementById('intake_result').innerHTML=html;
    toast(`${ok}건 입고 완료`,'success');
  };
  rd.readAsText(f,'utf-8');
}

  if(L.logBy){const q=L.logBy.toLowerCase();list=list.filter(h=>h.user?.toLowerCase().includes(q))}

  if(L.logFrom||L.logTo) list=list.filter(h=>{const d=h.date.slice(0,10);return dateInRange(d,L.logFrom,L.logTo)});

function dlLog(){
  const L=STATE.settings;
  let history = DATA.history.slice();
  // 화면(renderSetLog)과 동일 필터
  if(L.logQ){const q=L.logQ.toLowerCase();history=history.filter(h=>h.detail?.toLowerCase().includes(q)||h.user?.toLowerCase().includes(q))}
  if(L.logType) history=history.filter(h=>h.type===L.logType);
  if(L.logAction) history=history.filter(h=>h.action===L.logAction);
  if(L.logBy){const q=L.logBy.toLowerCase();history=history.filter(h=>h.user?.toLowerCase().includes(q))}
  if(L.logCls){history=history.filter(h=>{if(!h.studentId) return false;const st=DATA.students[h.studentId];return st && (st.class||'정규')===L.logCls})}
  if(L.logFrom||L.logTo) history=history.filter(h=>dateInRange((h.date||'').slice(0,10),L.logFrom,L.logTo));
  const rows=[['시각','유형','작업','상세','담당','학생','패드']];
  history.forEach(h=>rows.push([h.date,h.type,h.action,h.detail,h.user,h.studentId||'',h.padNum||'']));
  downloadCSV('활동로그_'+todayStr()+'.csv',rows);
}

    <div class="modal-title">새 기종 추가</div>
    <div class="form-row"><label>기종명<span class="req">*</span></label><input id="mdl_name" placeholder="예: A10"></div>
    <div class="form-row"><label>구성품 (쉼표 구분)<span class="req">*</span></label><input id="mdl_comps" placeholder="예: 본체, 충전기, 충전기선"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="doModelAdd()">추가</button></div>`);
}
function doModelAdd(){
  const name=document.getElementById('mdl_name').value.trim();
  const comps=document.getElementById('mdl_comps').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name){toast('기종명 필수','error');return}
  if(MODELS[name]){toast('이미 존재','error');return}
  if(!comps.length){toast('구성품 1개 이상','error');return}
  MODELS[name]=comps;
  addHistory('기종','추가',name+' · '+comps.join(','),null,null);
  closeModal();toast('기종 추가','success');showPage('settings');
}
function modelAddComp(k){
  openModal(`
    <div class="modal-title">${k} 구성품 추가</div>
    <div class="box box-warn" style="margin-bottom:12px;font-size:12px">기존 배부 학생의 구성품은 변하지 않고 <b>새 배부부터 적용</b>됩니다.</div>
    <div class="form-row"><label>구성품 이름<span class="req">*</span></label><input id="mdl_c" placeholder="예: 보호필름"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="doModelAddComp('${k}')">추가</button></div>`);
}
function doModelAddComp(k){
  const c=document.getElementById('mdl_c').value.trim();
  if(!c){toast('이름 필수','error');return}
  if(MODELS[k].includes(c)){toast('이미 존재','error');return}
  MODELS[k].push(c);
  addHistory('기종','구성품추가',k+' · '+c,null,null);
  closeModal();toast('추가 완료','success');showPage('settings');
}
function modelDelComp(k,i){
  const c=MODELS[k][i];
  ask('구성품 삭제',`${k}의 <b>${c}</b> 삭제? 기존 배부 학생은 그대로 유지, 새 배부부터 제외됩니다.`,'삭제','danger',()=>{
    MODELS[k].splice(i,1);
    addHistory('기종','구성품삭제',k+' · '+c,null,null);
    toast('삭제 완료','success');showPage('settings');
  });
}
function modelDelete(k){
  const inUse=Object.values(DATA.pads).filter(p=>p.model===k).length;
  ask('기종 삭제',`<b>${k}</b> 기종을 삭제합니다.<br>현재 사용 중: <b>${inUse}대</b>. 기존 배부 학생은 그대로 유지.<br><span style="color:var(--danger)">정말 삭제?</span>`,'삭제','danger',()=>{
    delete MODELS[k];
    addHistory('기종','삭제',k,null,null);
    toast(k+' 삭제','success');showPage('settings');
  });
}

/* 직원 관리 */
function renderSetStaff(){
  const canSeePw=isAdmin();  // 어드민만 전체 비번 조회
  // admin 계정은 본인이 admin일 때만 리스트에 노출 (보안)
  const staffList = Object.values(DATA.staff).filter(s=>s.id!=='admin' || currentUser==='admin');
  return `
    <div class="box">
      <div class="box-title">직원 관리</div>
      <div class="box-hint">관리자는 직원 추가·삭제·권한 수정 가능. 비밀번호는 <b>어드민만 조회 가능</b>. 일반 직원은 본인이 로그인 후 수정.</div>
      ${canEdit()?`<div style="margin-bottom:12px"><button class="btn btn-primary" onclick="staffAddNew()">+ 직원 추가</button></div>`:''}
      <table class="tbl"><thead><tr><th>아이디</th><th>이름</th><th>부서</th><th>권한</th><th>비밀번호</th><th>작업</th></tr></thead><tbody>
        ${staffList.map(s=>`<tr>
          <td><b>${s.id}</b></td>
          <td>${s.name}</td>
          <td><span class="badge badge-${s.dept==='교무'?'blue':s.dept==='총무'?'teal':s.dept==='스타터'?'gray':'yellow'}">${s.dept}</span></td>
          <td>${s.role}</td>
          <td style="font-family:monospace;font-size:12px">${canSeePw?s.pw:'••••'}</td>
          <td>${canEdit()&&s.id!=='admin'?`<button class="btn btn-sm" onclick="staffEdit('${s.id}')">수정</button> <button class="btn btn-sm btn-danger" onclick="staffDelete('${s.id}')">삭제</button>`:s.id==='admin'?'<span style="font-size:11px;color:var(--text-muted)">보호됨</span>':''}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>`;
}
function staffAddNew(){
  openModal(`
    <div class="modal-title">직원 추가</div>
    <div class="form-row"><label>아이디 (로그인용)<span class="req">*</span></label><input id="stf_id" placeholder="이름 또는 ID"></div>
    <div class="form-row"><label>이름<span class="req">*</span></label><input id="stf_name"></div>
    <div class="form-row-inline">
      <div class="form-row"><label>부서</label><select id="stf_dept"><option value="교무">교무</option><option value="총무">총무</option><option value="스타터">스타터</option></select></div>
      <div class="form-row"><label>권한</label><select id="stf_role"><option value="일반">일반</option><option value="관리자">관리자</option></select></div>
    </div>
    <div class="form-row"><label>비밀번호<span class="req">*</span></label><input id="stf_pw" type="text" placeholder="초기 비번 (직원이 나중에 수정)"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="doStaffAdd()">추가</button></div>`);
}
function doStaffAdd(){
  const id=document.getElementById('stf_id').value.trim();
  const name=document.getElementById('stf_name').value.trim();
  const dept=document.getElementById('stf_dept').value;
  const role=document.getElementById('stf_role').value;
  const pw=document.getElementById('stf_pw').value.trim();
  if(!id||!name||!pw){toast('필수 입력','error');return}
  if(DATA.staff[id]){toast('이미 존재','error');return}
  DATA.staff[id]={id,name,dept,role,pw};
  addHistory('직원','추가',id+' ('+dept+'·'+role+')',null,null);
  if(typeof fbSaveNow==='function') fbSaveNow();
  closeModal();toast('추가 완료','success');showPage('settings');
}
function staffEdit(id){
  const s=DATA.staff[id];
  openModal(`
    <div class="modal-title">직원 수정 — ${s.name}</div>
    <div class="form-row"><label>이름</label><input id="stf_name" value="${s.name}"></div>
    <div class="form-row-inline">
      <div class="form-row"><label>부서</label><select id="stf_dept"><option value="교무" ${s.dept==='교무'?'selected':''}>교무</option><option value="총무" ${s.dept==='총무'?'selected':''}>총무</option><option value="스타터" ${s.dept==='스타터'?'selected':''}>스타터</option></select></div>
      <div class="form-row"><label>권한</label><select id="stf_role"><option value="일반" ${s.role==='일반'?'selected':''}>일반</option><option value="관리자" ${s.role==='관리자'?'selected':''}>관리자</option></select></div>
    </div>
    <div class="form-row"><label>비밀번호</label><input id="stf_pw" type="text" value="${s.pw}"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="doStaffEdit('${id}')">저장</button></div>`);
}
function doStaffEdit(id){
  const s=DATA.staff[id];
  s.name=document.getElementById('stf_name').value.trim();
  s.dept=document.getElementById('stf_dept').value;
  s.role=document.getElementById('stf_role').value;
  s.pw=document.getElementById('stf_pw').value.trim();
  addHistory('직원','수정',id,null,null);
  if(typeof fbSaveNow==='function') fbSaveNow();
  closeModal();toast('수정 완료','success');showPage('settings');
}
function staffDelete(id){
  ask('직원 삭제',`<b>${id}</b> 삭제?`,'삭제','danger',()=>{
    delete DATA.staff[id];
    addHistory('직원','삭제',id,null,null);
    if(typeof fbSaveNow==='function') fbSaveNow();
    toast('삭제 완료','success');showPage('settings');
  });
}

function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value.trim();
  if(!id){toast('아이디 입력','error');return}
  const st=DATA.staff[id];
  if(!st){toast('존재하지 않는 직원','error');return}
  if(st.pw!==pw){toast('비밀번호 오류','error');return}
  quickLogin(id);
}

// ===== 앱 시작 =====
// Firebase에서 데이터 로드 후 앱 시작. 실패 시 로컬 빈 상태로 시작.
if(window.__firebaseDb){
  fbLoadAll(()=>{
    fbStartRealtimeSync();
  });
} else {
  initData();
}
document.getElementById('modalBg').addEventListener('click',(e)=>{if(e.target.id==='modalBg') closeModal()});

// 한글 IME 조합 감지 (검색창 입력 중 재렌더로 글자 깨지는 것 방지)
window.__imeComposing = false;
window.__pendingPage = null;
document.addEventListener('compositionstart', ()=>{ window.__imeComposing = true; });
document.addEventListener('compositionend', ()=>{
  window.__imeComposing = false;
  if(window.__pendingPage){
    const p = window.__pendingPage;
    window.__pendingPage = null;
    showPage(p);
  }
  // IME 조합 동안 미뤄둔 원격 데이터가 있으면 지금 반영
  if(window.__fbPendingApply){
    const v = window.__fbPendingApply;
    window.__fbPendingApply = null;
    if(typeof fbApplyRemoteData==='function') fbApplyRemoteData(v);
  }
});

// 페이지 떠나기 전 저장 중이면 경고
window.addEventListener('beforeunload', (e)=>{
  if(window.__fbSaveInFlight > 0){
    e.preventDefault();
    e.returnValue = '저장 중입니다. 잠시만 기다려주세요.';
    return e.returnValue;
  }
});

// 페이지 가려질 때 자동 저장 제거 — 옛 DATA로 통째 덮어쓰는 부작용 차단
// (모든 변경은 그 시점에 이미 fbSaveNow로 저장되므로 추가 저장 불필요)

// 입력 폼에서 포커스 떠나면 미뤄둔 원격 데이터 적용
document.addEventListener('focusout', ()=>{
  setTimeout(()=>{
    if(!window.__fbPendingApply) return;
    const ae = document.activeElement;
    if(ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT')) return;
    if(window.__imeComposing) return;
    const modalBg = document.getElementById('modalBg');
    if(modalBg && modalBg.classList.contains('active')) return;
    const v = window.__fbPendingApply;
    window.__fbPendingApply = null;
    if(typeof fbApplyRemoteData==='function') fbApplyRemoteData(v);
  }, 200);
});
