// 이미 배부된 패드의 구성품 수정 저장
function as_saveCompEdit(padNum, sid){
  // 권한 확인 (배부 권한자만 = 스타터=데스크 제외)
  if(currentRole==='스타터'){toast('배부 권한자만 가능 (어드민/교무팀장/교무/총무팀장/총무)','error');return}
  const st = DATA.students[sid];
  if(!st){toast('학생 없음','error');return}
  const mp = (st.pads||[]).find(p=>p.num===padNum && !p.archived);
  if(!mp){toast('패드 정보 없음','error');return}
  const reason = (document.getElementById('ed_reason').value||'').trim();
  if(!reason){toast('수정 사유 필수','error');return}
  // components 정규화 (객체/문자열 둘 다 처리)
  const compNames = (mp.components||[]).map(c=>typeof c==='string'?c:(c.name||'')).filter(c=>c && c!=='파손확인');
  // 변경된 구성품 추적
  const changes = [];
  compNames.forEach(c=>{
    const cb = document.getElementById('ed_comp_'+c);
    if(!cb) return;
    // 현재 leased 상태 확인 (두 형식 모두)
    let wasLeased = true;
    if(mp.leased && typeof mp.leased==='object' && c in mp.leased) {
      wasLeased = mp.leased[c] !== false;
    } else {
      const compObj = (mp.components||[]).find(cc=>typeof cc==='object' && cc.name===c);
      if(compObj) wasLeased = compObj.rented !== false;
    }
    const nowLeased = cb.checked;
    if(wasLeased !== nowLeased){
      // leased 객체 형식으로 통일
      mp.leased = mp.leased || {};
      mp.leased[c] = nowLeased;
      // 객체 형식 components도 동기화
      if(Array.isArray(mp.components)){
        mp.components.forEach(cc=>{
          if(typeof cc==='object' && cc.name===c) cc.rented = nowLeased;
        });
      }
      changes.push(`${c}: ${wasLeased?'대여→미대여':'미대여→대여'}`);
      // 미대여로 바뀌면 returned도 done 처리 안 함 (미회수 상태)
      if(!nowLeased){
        mp.returned = mp.returned || {};
        mp.returned[c] = mp.returned[c] || {done:false,memos:[]};
      }
    }
  });
  if(changes.length===0){toast('변경된 구성품이 없습니다','error');return}
  // 사유 메모 추가
  mp.leaseMemo = (mp.leaseMemo?mp.leaseMemo+' / ':'') + `[수정 ${todayStr()}] ${reason}`;
  // 활동 로그
  addHistory('월납','구성품수정',`${st.name} · ${padNum} · ${changes.join(', ')} (사유: ${reason})`,sid,padNum);
  toast(`✓ 구성품 수정 완료 (${changes.length}개)`,'success');
  // 입력 초기화
  document.getElementById('as_pad').value='';
  document.getElementById('as_padHint').textContent='바로 배부 가능한 패드 입력';
  document.getElementById('as_padHint').className='form-hint';
  document.getElementById('as_editArea').innerHTML='';
  // 학생 이름란도 초기화
  const ni = document.getElementById('as_name'); if(ni) ni.value='';
}

function as_save(type){
  // 권한 확인 (배부 권한자만 = 스타터=데스크 제외)
  if(currentRole==='스타터'){toast('배부 권한자만 가능 (어드민/교무팀장/교무/총무팀장/총무)','error');return}
  const name=document.getElementById('as_name').value.trim();
  const num=document.getElementById('as_pad').value.trim();
  const cls = document.getElementById('as_class')?.value || '정규';
  if(!num){toast('패드번호 필수','error');return}
  if(!name){toast('학생 이름 필수 — 이름 없이 등록은 엑셀 업로드 이용','error');return}
  if(!cls){toast('반 선택 필수','error');return}
  // 등록된 반인지 확인
  const validClasses = DATA._classes || ['정규'];
  if(!validClasses.includes(cls)){toast(`등록되지 않은 반 "${cls}". 설정 → 반 관리에서 먼저 추가`,'error');return}
  const p=DATA.pads[num];
  if(!p||p.type!==type||p.status!=='창고'){toast('배부 불가 (창고 상태만 가능)','error');return}
  if(!p.fenceNum){toast('펜스 없는 패드 — 펜스 관리에서 먼저 매칭하세요','error');return}

  // 기존 학생 발견 → 추가 대여 확인 팝업
  if(DATA.students[name]){
    const existing = DATA.students[name];
    const activePads = (existing.pads||[]).filter(pp=>!pp.archived);
    const padInfo = activePads.length ? activePads.map(pp=>`${pp.type}·${pp.num}`).join(', ') : '없음';
    ask(
      '⚠️ 기존 학생 발견',
      `<div style="padding:8px 0">
        <div style="margin-bottom:10px">이미 등록된 학생입니다.</div>
        <div style="background:#fafaf5;padding:10px;border-radius:6px;font-size:13px;line-height:1.6">
          <b>${existing.name}</b>${classBadge(existing)} · 상태: ${existing.status}<br>
          <span style="color:var(--text-muted)">기존 패드: ${padInfo}</span>
        </div>
        <div style="margin-top:12px;font-size:13px">정말 <b>${num}</b> 패드를 추가 대여하시겠습니까?</div>
        <div style="font-size:12px;color:var(--warning);margin-top:6px">⚠ 보통 1명 = 1개입니다. 실수가 아닌지 확인하세요.</div>
      </div>`,
      '추가 대여','primary',
      ()=>as_doSave(type, name, num, cls, true)
    );
    return;
  }
  // 신규 학생 → 바로 진행
  as_doSave(type, name, num, cls, false);
}

function as_doSave(type, name, num, cls, isAddition){
  const p=DATA.pads[num];
  let fenceNum;
  if(type==='신규'){
    const ft=document.getElementById('as_fenceType').value;
    if(ft==='same') fenceNum=num;
    else if(ft==='reuse'){fenceNum=document.getElementById('as_fenceReuse').value;if(!fenceNum){toast('재활용 펜스 선택','error');return}}
    else{fenceNum=document.getElementById('as_fenceNew').value.trim();if(!fenceNum){toast('펜스 번호 입력','error');return}}
  }else{
    fenceNum=document.getElementById('as_fence').value.trim()||num;
  }
  const dateStr=todayStr();

  // 정식 배부
  const baseComps=(MODELS[p.model]||['본체','충전기']).slice();
  const components=baseComps.concat(['파손확인']);
  const leased={},returned={};
  components.forEach(c=>{leased[c]=true;returned[c]={done:false,memos:[]}});
  let leaseMemo='';
  if(type==='월납'){
    let anyUn=false;
    baseComps.forEach(c=>{const el=document.getElementById('asc_'+c);if(el&&!el.checked){leased[c]=false;anyUn=true}});
    leased['파손확인']=true;
    if(anyUn){leaseMemo=(document.getElementById('as_leaseMemo').value||'').trim();if(!leaseMemo){toast('미대여 사유 메모 필수','error');return}}
  }
  const padStatus=type==='신규'?'배부':'대여중';
  const newPad = {type,num,model:p.model,fenceNum,assignedDate:dateStr,assignedBy:currentUser,components,leased,returned};
  if(leaseMemo) newPad.leaseMemo = leaseMemo;
  if(isAddition){
    // 기존 학생에 패드 추가
    DATA.students[name].pads.push(newPad);
    if(DATA.students[name].status!=='재원') DATA.students[name].status='재원';  // 재원 보장
  } else {
    // 신규 학생
    DATA.students[name]={id:name,name,class:cls,status:'재원',pads:[newPad]};
  }
  p.status=padStatus;p.studentId=name;p.fenceNum=fenceNum;p.assignedDate=dateStr;p.assignedBy=currentUser;
  DATA.fences[fenceNum]={num:fenceNum,type,status:'사용중',padNum:num,studentId:name};
  DATA.assignHistory.unshift({id:'ah_'+Date.now(),type,padNum:num,studentId:name,fenceNum,assignedDate:dateStr,assignedBy:currentUser,method:isAddition?'추가대여':'단건',memo:leaseMemo||''});
  addHistory(type, isAddition?'추가대여':'배부', `${name} (${cls}) · ${num}${isAddition?' [추가 대여 - 이미 패드 보유]':''}${leaseMemo?' ('+leaseMemo+')':''}`, name, num);
  if(typeof fbSaveNow==='function') fbSaveNow();
  toast(`${name}(${cls})에게 ${num} ${type==='신규'?'배부':'대여'} 완료${isAddition?' (추가)':''}`,'success');
  showPage(type==='신규'?'newAssign':'monthlyAssign');
}

}
function as_template(type){
  const rows = [['패드번호','펜스번호','학생이름','반'],[type==='신규'?'625':'b81',type==='신규'?'625':'b81','홍길동','정규'],[type==='신규'?'626':'b82',type==='신규'?'626':'b82','','정규']];
  downloadCSV(type+'_양식_'+todayStr()+'.csv',rows);
}
function as_upload(type){
  const f=document.getElementById('as_file').files[0];
  if(!f){toast('파일 선택','error');return}
  const rd=new FileReader();
  rd.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<=1){toast('데이터 없음','error');return}
    let matched=0,skipped=0,errs=[];
    lines.slice(1).forEach((ln,idx)=>{
      const [padNum,fenceNum,name,clsRaw,modelInput]=ln.split(',').map(x=>x?.replace(/^"|"$/g,'').trim()||'');
      if(!padNum) return;
      let p=DATA.pads[padNum];
      const fnum=fenceNum||padNum;
      const dateStr=todayStr();

      // 입고 선행 원칙: 창고에 없는 번호는 오류
      if(!p){
        errs.push(`${idx+2}행: ${padNum} 창고에 없음 — <b>먼저 [설정→패드 입고]에서 입고 필요</b>`);
        return;
      }
      if(p.type!==type){errs.push(`${idx+2}행: ${padNum} 타입불일치 (현재 ${p.type})`);return}
      if(p.status!=='창고'&&p.status!=='미지정'){errs.push(`${idx+2}행: ${padNum} 배부불가 (${p.status})`);return}

      if(!name){
        skipped++;  // 이름 빈칸은 그대로 창고 유지
        return;
      }

      // 반 검증: 빈칸 거부 + 등록된 반만 허용
      if(!clsRaw){
        errs.push(`${idx+2}행: ${name} - <b>반이 비어있음</b> (등록된 반: ${(DATA._classes||[]).join('/')})`);
        return;
      }
      const validClasses = DATA._classes || ['정규'];
      if(!validClasses.includes(clsRaw)){
        errs.push(`${idx+2}행: ${name} - 등록되지 않은 반 "<b>${clsRaw}</b>" (허용: ${validClasses.join('/')}) → 설정 → 반 관리에서 먼저 추가하세요`);
        return;
      }
      const cls = clsRaw;

      if(DATA.students[name]){errs.push(`${idx+2}행: 중복 학생 ${name}`);return}
      const comps=(MODELS[p.model]||['본체','충전기']).concat(['파손확인']);
      const leased={},returned={};
      comps.forEach(c=>{leased[c]=true;returned[c]={done:false,memos:[]}});
      DATA.students[name]={id:name,name,class:cls,status:'재원',pads:[{type,num:padNum,model:p.model,fenceNum:fnum,assignedDate:dateStr,assignedBy:currentUser,components:comps,leased,returned}]};
      p.status=type==='신규'?'배부':'대여중';p.studentId=name;p.fenceNum=fnum;p.assignedDate=dateStr;p.assignedBy=currentUser;
      DATA.fences[fnum]={num:fnum,type,status:'사용중',padNum,studentId:name};
      DATA.assignHistory.unshift({id:'ah_'+Date.now()+'_'+idx,type,padNum,studentId:name,fenceNum:fnum,assignedDate:dateStr,assignedBy:currentUser,method:'엑셀'});
      matched++;
    });
    // 활동 로그 + Firebase 즉시 저장 (엑셀 일괄은 addHistory 호출이 누락되어 있어 저장이 안 됐음)
    if(matched>0){
      addHistory(type,'엑셀일괄',`${type==='신규'?'배부':'대여'} ${matched}건 일괄 처리`,null,null);
      if(typeof fbSaveNow==='function') fbSaveNow();
    }
    let msg=`<b>${type==='신규'?'배부':'대여'} 완료 ${matched}건</b>`;
    if(skipped) msg+=` · 빈칸 ${skipped}건 (창고 유지)`;
    if(errs.length) msg+=` · 오류 ${errs.length}건`;
    document.getElementById('as_result').innerHTML=`<div class="box ${errs.length?'box-warn':'box-ok'}" style="margin-top:14px">${msg}${errs.length?'<div style="font-size:12px;color:var(--danger);margin-top:8px">'+errs.slice(0,10).join('<br>')+(errs.length>10?'<br>... 외 '+(errs.length-10)+'건':'')+'</div>':''}</div>`;
    toast(`${matched}건 매칭 완료`,'success');
  };
  rd.readAsText(f,'utf-8');
}

  const validClasses = DATA._classes || ['정규'];
  if(!validClasses.includes(cls)){toast(`등록되지 않은 반 "${cls}"`,'error');return}
  if(DATA.students[name]){toast('중복','error');return}
  const p=DATA.pads[padNum];

  DATA.students[name]={id:name,name,class:cls,status:'재원',pads:[{type:p.type,num:padNum,model:p.model,fenceNum:fnum,assignedDate:dateStr,assignedBy:currentUser,components:comps,leased,returned}]};

/* 배부 취소 가능 여부 판정 (취소 버튼 표시 조건) */
function canCancelAssign(h){
  if(!h) return false;
  if(currentRole==='스타터') return false;  // 스타터(데스크) 제외
  const st = DATA.students[h.studentId];
  if(!st) return false;
  if(st.status !== '재원') return false;  // 재원 상태 학생만
  const p = DATA.pads[h.padNum];
  if(!p) return false;
  if(p.studentId !== h.studentId) return false;  // 다른 학생에게 가있으면 X
  if(p.type !== h.type) return false;  // 종류 변경됐으면 X (전환 등)
  if(p.broken) return false;  // 파손이면 X
  if(!(st.pads||[]).some(pp=>pp.num===h.padNum && !pp.archived)) return false;
  return true;
}

/* 배부 취소 - 안전 확인 모달 */
function askCancelAssign(historyId){
  if(currentRole==='스타터'){toast('취소 권한 없음','error');return}
  const h = DATA.assignHistory.find(x=>x.id===historyId);
  if(!h){toast('이력 정보 없음','error');return}
  if(!canCancelAssign(h)){toast('이 배부는 취소할 수 없음 (학생 상태/패드 상태 확인)','error');return}
  const st = DATA.students[h.studentId];
  const willDeleteStudent = (st.pads||[]).filter(pp=>!pp.archived).length===1;
  ask(
    '⚠ 배부 취소 (실수 정정용)',
    `<div style="line-height:1.7">
      <b style="font-size:15px">${st.name}</b> (${st.class||'정규'})<br>
      ${h.type} 패드 <b>${h.padNum}</b> · 펜스 ${h.fenceNum||'—'}<br>
      배부일 ${h.assignedDate} (${h.assignedBy||''})${h.memo?'<br>메모: '+h.memo:''}
    </div>
    <div style="margin-top:12px;padding:10px;background:#fee2e2;border-radius:8px;font-size:13px;color:#991b1b">
      <b>⚠ 취소하면 다음이 일어납니다:</b><br>
      • 학생 정보에서 이 패드 제거<br>
      • 패드 → 창고 복귀<br>
      ${h.fenceNum?'• 펜스 → 여유 풀로 복귀<br>':''}
      ${willDeleteStudent?'• <b>학생 카드도 삭제됨 (다른 패드 없음)</b><br>':''}
      • 활동 로그에 ${currentUser} 취소자로 기록
    </div>`,
    '취소 확정',
    'danger',
    ()=>doCancelAssign(historyId)
  );
}

function doCancelAssign(historyId){
  const h = DATA.assignHistory.find(x=>x.id===historyId);
  if(!h){toast('이력 정보 없음','error');return}
  if(!canCancelAssign(h)){toast('취소 불가 상태로 변경됨','error');closeModal();return}
  const sid = h.studentId;
  const padNum = h.padNum;
  const fenceNum = h.fenceNum;
  const type = h.type;
  const st = DATA.students[sid];
  const p = DATA.pads[padNum];
  // 학생에서 해당 패드 제거
  const padIdx = (st.pads||[]).findIndex(pp=>pp.num===padNum && !pp.archived);
  if(padIdx>=0) st.pads.splice(padIdx,1);
  const studentDeleted = (st.pads||[]).filter(pp=>!pp.archived).length===0;
  if(studentDeleted) delete DATA.students[sid];
  // 패드 창고 복귀
  p.status = '창고';
  delete p.studentId;
  delete p.assignedDate;
  delete p.assignedBy;
  // 펜스 여유 복귀 (해당 펜스가 이 패드/학생에 묶여 있을 때만)
  if(fenceNum && DATA.fences[fenceNum]){
    const f = DATA.fences[fenceNum];
    if(f.padNum===padNum || f.studentId===sid){
      f.status='여유';
      delete f.studentId;
    }
  }
  // 배부 이력에서 제거
  const histIdx = DATA.assignHistory.findIndex(x=>x.id===historyId);
  if(histIdx>=0) DATA.assignHistory.splice(histIdx,1);
  // 활동 로그 추가
  addHistory(type, '배부취소', `${sid} (${(st&&st.class)||'정규'}) · ${padNum} 배부 취소${studentDeleted?' · 학생 카드 삭제':''}`, studentDeleted?null:sid, padNum);
  if(typeof fbSaveNow==='function') fbSaveNow();
  closeModal();
  toast(`${sid}의 ${padNum} 배부 취소 완료${studentDeleted?' (학생 카드 삭제)':''}`,'success');
  showPage(currentPage);
}

function dlSearchExcel(){
  // 현재 검색 결과 엑셀로
  const q=(STATE.search.q||'').trim();
  const cls=STATE.search.cls||'';
  const sf=STATE.search.statusFilter||'';
  const ql=q.toLowerCase();
  let students=Object.values(DATA.students).filter(st=>{
    if(q && !st.name.toLowerCase().includes(ql)) return false;
    if(cls && (st.class||'정규')!==cls) return false;
    if(sf){
      if(sf==='재원'){if(st.status!=='재원') return false;}
      else if(sf==='대기'){
        const isUnreturned = st.status==='퇴원' && (st.pads||[]).find(p=>p.type==='월납'&&!p.archived);
        const isRefundWait = st.status==='환불대기';
        if(!isUnreturned && !isRefundWait) return false;
      } else if(sf==='퇴반'){if(!st.refundCompletedDate) return false;}
    }
    return true;
  });
  // 정렬
  if(sf==='퇴반'){students.sort((a,b)=>(b.refundCompletedDate||'').localeCompare(a.refundCompletedDate||''))}
  else students.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  const rows=[['학생','반','상태','패드(종류·번호)','퇴원일','환불완료일']];
  students.forEach(st=>{
    const si=getStudentDisplayStatus(st);
    const padInfo=(st.pads||[]).filter(p=>!p.archived).map(p=>p.type+'·'+p.num).join(' / ');
    rows.push([st.name, st.class||'정규', si.label, padInfo||'-', st.tuebanDate||'', st.refundCompletedDate||'']);
  });
  downloadCSV('학생검색_'+todayStr()+'.csv',rows);
}
function dlAssignHist(type){
  const stateKey = type==='신규'?'newAssign':'monthlyAssign';
  const ST = STATE[stateKey];
  let list=DATA.assignHistory.filter(h=>h.type===type);
  // 화면과 동일 필터
  if(ST.histQ){const q=ST.histQ.toLowerCase();list=list.filter(h=>h.studentId?.toLowerCase().includes(q)||h.padNum?.toLowerCase().includes(q)||h.assignedBy?.toLowerCase().includes(q))}
  if(ST.histCls){list=list.filter(h=>{const st=DATA.students[h.studentId];return st && (st.class||'정규')===ST.histCls})}
  if(ST.histFrom||ST.histTo) list=list.filter(h=>dateInRange(h.assignedDate,ST.histFrom,ST.histTo));
  const rows=[['배부일','학생','반','패드','펜스','방법','담당','메모']];

    const st=DATA.students[h.studentId];

  });
  downloadCSV(type+'_배부이력_'+todayStr()+'.csv',rows);
}

/* ============ 전환 모달 (신규→월납) ============ */
function canConvert(){return (currentDept==='교무'||currentDept==='총무')&&currentRole==='관리자'||currentRole==='어드민'}
function openConvertModal(defaultFrom,defaultTo,opts){
  if(!canConvert()){toast('권한 없음','error');return}
  const fromType = defaultFrom||'신규';
  const toType = defaultTo||'';
  const targetPad = opts?.padNum;
  const stockCount = (t)=>Object.values(DATA.pads).filter(p=>p.type===t && (p.status==='창고'||p.status==='보관'||p.status==='미지정'||p.status==='직원사용') && !p.studentId).length;
  openModal(`
    <div class="modal-title">⇄ 패드 전환${targetPad?' — '+targetPad:''}</div>
    <div class="modal-desc"><b>교무·총무 관리자 + 어드민만</b>. ${targetPad?'해당 패드를 다른 종류로 전환합니다.':'재고가 비어있는 종류에 다른 종류 패드를 이동.'}</div>
    <div class="form-row-inline">
      <div class="form-row"><label>From<span class="req">*</span></label>
        <select id="cv_from" onchange="cv_refreshPads();cv_updateFenceHint();cv_updateFromLabel()" ${targetPad?'disabled':''}>
          <option value="신규" ${fromType==='신규'?'selected':''}>신규 (창고 ${stockCount('신규')}대)</option>
          <option value="월납" ${fromType==='월납'?'selected':''}>월납 (창고 ${stockCount('월납')}대)</option>
          <option value="무료" ${fromType==='무료'?'selected':''}>무료 (${stockCount('무료')}대)</option>
        </select>
      </div>
      <div class="form-row"><label>To<span class="req">*</span></label>
        <select id="cv_to" onchange="cv_toggleSubType();cv_updateFenceHint()">
          <option value="" ${!toType?'selected':''} disabled>-- 선택 --</option>
          <option value="신규" ${toType==='신규'?'selected':''}>신규</option>
          <option value="월납" ${toType==='월납'?'selected':''}>월납</option>
          <option value="무료" ${toType==='무료'?'selected':''}>무료</option>
          <option value="폐기" ${toType==='폐기'?'selected':''}>⚠ 폐기 (재고 제거)</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="cv_subtype_wrap" style="display:${toType==='무료'?'block':'none'}">
      <label>무료 세부 용도<span class="req">*</span></label>
      <select id="cv_subtype" onchange="cv_updateFenceHint()">
        <option value="대여">무료 대여용 (학생 단기 대여, 펜스 있음)</option>
        <option value="직원">직원용 (직원 업무용, 펜스 없음)</option>
      </select>
    </div>

    ${targetPad?`
    <div class="form-row"><label>패드번호</label>
      <input value="${targetPad}" disabled style="background:#f5f1ea">
    </div>
    `:`
    <div class="form-row">
      <label>패드번호<span class="req">*</span> <span style="font-size:11px;color:var(--text-muted)">(직접 입력하거나 아래 드롭다운에서 선택)</span></label>
      <input id="cv_padInput" placeholder="예: b81 / 625 / 787" oninput="cv_syncPadInput(this.value)">
    </div>
    <div class="form-row">
      <label>또는 재고 목록에서 선택</label>
      <select id="cv_pad" onchange="cv_syncPadSelect(this.value)">
        <option value="">-- 재고 목록 --</option>
      </select>
    </div>
    `}

    <div class="box" id="cv_fence_hint" style="padding:10px;font-size:12px;margin-bottom:12px"></div>
    <div class="form-row"><label>사유<span class="req">*</span></label><input id="cv_reason" placeholder="예: 월납 대여 재고 부족 / 직원용 → 무료 대여로 / 폐기 사유"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-warning" id="cv_submitBtn" onclick="doConvert()">전환 실행</button></div>`);
  if(!targetPad) cv_refreshPads();
  cv_updateFenceHint();
}
function cv_syncPadInput(val){
  const sel=document.getElementById('cv_pad');
  if(sel){
    // 드롭다운에서 해당 값 찾아서 선택(보여주기만)
    const opt=Array.from(sel.options).find(o=>o.value===val.trim());
    sel.value=opt?val.trim():'';
  }
}
function cv_syncPadSelect(val){
  const inp=document.getElementById('cv_padInput');
  if(inp) inp.value=val;
}
function cv_toggleSubType(){
  const to=document.getElementById('cv_to').value;
  const sub=document.getElementById('cv_subtype_wrap');
  if(sub) sub.style.display=(to==='무료')?'block':'none';
}
function cv_refreshPads(){
  const from=document.getElementById('cv_from').value;
  const sel=document.getElementById('cv_pad');
  if(!sel || sel.disabled) return;
  const stock=Object.values(DATA.pads).filter(p=>p.type===from && (p.status==='창고'||p.status==='보관'||p.status==='미지정'||p.status==='직원사용') && !p.studentId);
  // 펜스 있는 것 먼저 정렬 (배부 가능), 펜스 없는 것 뒤로
  const withFence = stock.filter(p=>p.fenceNum).sort((a,b)=>(a.num+'').localeCompare(b.num+''));
  const noFence = stock.filter(p=>!p.fenceNum).sort((a,b)=>(a.num+'').localeCompare(b.num+''));
  let html = '<option value="">-- 재고 목록 ('+stock.length+'대) --</option>';
  if(withFence.length){
    html += '<optgroup label="✓ 펜스 매칭됨 ('+withFence.length+'대) — 바로 전환 후 배부 가능">';
    html += withFence.map(p=>`<option value="${p.num}">${p.num} (${p.model||'A9'}, ${p.status}) · 펜스 ${p.fenceNum}</option>`).join('');
    html += '</optgroup>';
  }
  if(noFence.length){
    html += '<optgroup label="⚠ 펜스 없음 ('+noFence.length+'대) — 전환 후 펜스 매칭 필요">';
    html += noFence.map(p=>`<option value="${p.num}">${p.num} (${p.model||'A9'}, ${p.status}) · 펜스없음</option>`).join('');
    html += '</optgroup>';
  }
  if(!stock.length) html='<option value="">재고 없음</option>';
  sel.innerHTML = html;
}
function cv_updateFromLabel(){
  // From 바뀌면 재고 숫자 반영하려면 모달을 다시 그려야 하지만, 드롭다운 value 자체는 유지.
  // 여기선 cv_refreshPads()에서 재고 목록만 갱신. 제목은 놔둠.
}
function cv_updateFenceHint(){
  const from=document.getElementById('cv_from').value;
  const to=document.getElementById('cv_to').value;
  const sub=document.getElementById('cv_subtype')?.value||'대여';
  const hintEl=document.getElementById('cv_fence_hint');
  const btnEl=document.getElementById('cv_submitBtn');
  if(!hintEl) return;

  if(!to){
    hintEl.className='box';
    hintEl.innerHTML='<span style="color:var(--text-muted)">To(전환 대상)를 선택하세요.</span>';
    if(btnEl){btnEl.textContent='전환 실행';btnEl.classList.remove('btn-danger');btnEl.classList.add('btn-warning')}
    return;
  }

  if(to==='폐기'){
    hintEl.className='box box-danger';
    hintEl.innerHTML='<b>⚠ 폐기 처리</b>: 재고에서 <b>완전히 제거</b>됩니다. 펜스가 있으면 자동으로 삭제 대기로 이동합니다.<br>(되돌릴 수 없습니다 — 정말 폐기할 경우에만 진행)';
    if(btnEl){btnEl.textContent='⚠ 폐기 실행';btnEl.classList.remove('btn-warning');btnEl.classList.add('btn-danger')}
    return;
  }

  if(btnEl){btnEl.textContent='전환 실행';btnEl.classList.remove('btn-danger');btnEl.classList.add('btn-warning')}

  const fromHasFence = (from==='신규'||from==='월납'||(from==='무료'));  // 무료는 상태에 따라 다시 판단 - 아래 doConvert에서 정확히
  const toHasFence = (to==='신규'||to==='월납'||(to==='무료'&&sub==='대여'));
  // 더 정확한 판단: 특정 패드가 지정돼있으면 그 패드의 현재 상태 기준
  let fromHasFenceActual = (from==='신규'||from==='월납');
  if(from==='무료'){
    // 선택된 패드가 직원사용이면 펜스 없음, 보관이면 있음
    const padVal = document.getElementById('cv_padInput')?.value || document.getElementById('cv_pad')?.value || '';
    if(padVal){
      const p=DATA.pads[padVal.trim()];
      if(p) fromHasFenceActual = (p.status!=='직원사용');
    } else {
      fromHasFenceActual = true; // 기본 가정: 보관 상태
    }
  }

  let msg='';
  if(fromHasFenceActual && !toHasFence){
    msg=`<b>펜스 처리</b>: 현재 펜스가 <b>삭제 대기</b>로 이동합니다. 모바일펜스 사이트에서 실제 삭제 후 펜스 관리 탭에서 "삭제 완료 체크" 하세요.`;
    hintEl.className='box box-warn';
  } else if(!fromHasFenceActual && toHasFence){
    msg=`<b>펜스 처리</b>: 새 펜스가 <b>추가 대기</b>로 등록됩니다. 모바일펜스 사이트에서 실제 계정 생성 후 펜스 관리 탭에서 "추가 완료 체크" 하세요.`;
    hintEl.className='box box-warn';
  } else if(fromHasFenceActual && toHasFence){
    msg=`<b>펜스 처리</b>: 기존 펜스 번호 그대로 유지되며 종류만 바뀝니다.`;
    hintEl.className='box box-ok';
  } else {
    msg=`<b>펜스 처리</b>: 양쪽 모두 펜스 없음 (처리 불필요).`;
    hintEl.className='box';
  }
  hintEl.innerHTML=msg;
}
function doConvert(){
  // 패드번호: 입력 or 드롭다운 or 고정
  let num = '';
  const disabledInput = document.querySelector('.modal input[disabled]');
  if(disabledInput && disabledInput.value) num = disabledInput.value;
  else {
    num = (document.getElementById('cv_padInput')?.value || document.getElementById('cv_pad')?.value || '').trim();
  }
  const from=document.getElementById('cv_from').value;
  const to=document.getElementById('cv_to').value;
  const sub=document.getElementById('cv_subtype')?.value||'대여';
  const reason=document.getElementById('cv_reason').value.trim();
  if(!to){toast('To(전환 대상) 선택','error');return}
  if(!num){toast('패드번호 입력 또는 선택','error');return}
  if(!reason){toast('사유 필수','error');return}
  const p=DATA.pads[num];
  if(!p){toast(`${num} 패드 없음`,'error');return}
  if(p.type!==from){toast(`${num}은(는) ${p.type} 패드입니다. From과 일치해야 함`,'error');return}
  if(p.studentId){toast(`${num}은(는) 현재 학생에게 배부/대여 중입니다`,'error');return}

  // 폐기 처리
  if(to==='폐기'){
    ask('⚠ 폐기 확정',`${p.type} 패드 <b>${num}</b>을(를) 폐기합니다.<br>재고 -1 · ${p.type==='무료'&&p.status==='직원사용'?'펜스 없음 (처리 불필요)':'펜스는 삭제 대기로 이동'}<br><br><b>되돌릴 수 없습니다. 계속?</b>`,'폐기 실행','danger',()=>{
      // 펜스 처리
      if(p.type!=='무료' || p.status!=='직원사용'){
        // 펜스 있음 → 삭제대기
        if(DATA.fences[num]){
          DATA.fences[num].status='삭제대기';
          DATA.fences[num].waitingDate=todayStr();
          DATA.fences[num].reason=`${p.type} ${num} 폐기`;
          delete DATA.fences[num].studentId;
        }
      }
      // 패드 제거
      delete DATA.pads[num];
      addHistory('폐기',p.type+' 폐기',num+' · '+reason,null,num);
      closeModal();toast(`${num} 폐기 완료 — 재고 -1, 펜스 삭제대기`,'success');showPage(currentPage);
    });
    return;
  }

  // 일반 전환
  // 펜스 유무 실제 판단
  const fromHasFenceActual = (p.type!=='무료') || (p.status!=='직원사용');
  const toHasFence = (to==='신규'||to==='월납'||(to==='무료'&&sub==='대여'));

  if(from===to){
    // 동일 type 내 대여↔직원 전환만 허용
    if(!(to==='무료' && ((p.status==='보관'&&sub==='직원')||(p.status==='직원사용'&&sub==='대여')))){
      toast('동일한 종류/용도로는 전환 불가','error');return;
    }
  }

  p.type=to;
  if(to==='무료' && sub==='직원') p.status='직원사용';
  else if(to==='무료') p.status='보관';
  else p.status='창고';

  const today=todayStr();
  if(fromHasFenceActual && !toHasFence){
    if(DATA.fences[num]){
      DATA.fences[num].status='삭제대기';
      DATA.fences[num].waitingDate=today;
      DATA.fences[num].reason=`${from}→${to}${to==='무료'?'('+sub+')':''} 전환`;
      delete DATA.fences[num].studentId;
    }
    delete p.fenceNum;
  } else if(!fromHasFenceActual && toHasFence){
    // 펜스 없는 종류 → 펜스 있는 종류 전환
    // 여유 펜스 있는지 확인
    const freeFences=Object.values(DATA.fences).filter(f=>f.status==='미지정'&&f.type===to);
    if(freeFences.length>0){
      // 여유 펜스 있으면 재활용 선택 모달
      closeModal();
      ask('펜스 재활용 가능',
        `여유 펜스 ${freeFences.length}개가 있습니다. 어떻게 할까요?<br><br>
        <b>옵션 1</b>: 여유 펜스 재활용 (번호를 ${num}으로 수정)<br>
        → 펜스 관리에서 바로 매칭 기능 사용<br><br>
        <b>옵션 2</b>: 새 계정 생성 (모바일펜스에서 결제 후 생성)<br>
        → "새 계정 생성 대기"로 등록`,
        '옵션 2: 새로 생성','primary',()=>{
          // 새 계정 생성 대기로 등록
          DATA.fences[num]={num,type:to,status:'추가대기',padNum:num,waitingDate:today,reason:`${from}→${to}${to==='무료'?'('+sub+')':''} 전환`};
          p.fenceNum=num;
          _finishConvert(num,from,to,sub,reason,fromHasFenceActual,toHasFence,'new');
        },
        '옵션 1: 여유 재활용',()=>{
          // 여유 펜스 재활용 UI로
          // 가장 최근에 삭제된 여유 펜스 자동 선택
          const f=freeFences[0];
          const oldKey=f.num;
          delete DATA.fences[oldKey];
          DATA.fences[num]={num,type:to,status:'사용대기',padNum:num,matchedFrom:oldKey,matchedDate:today,matchedBy:currentUser};
          p.fenceNum=num;
          addHistory('펜스','재활용',`여유 ${oldKey} → ${num} (${p.type} 전환)`,null,num);
          _finishConvert(num,from,to,sub,reason,fromHasFenceActual,toHasFence,'reuse',oldKey);
        });
      return;
    } else {
      // 여유 펜스 없음 → 무조건 새 계정 생성 대기
      DATA.fences[num]={num,type:to,status:'추가대기',padNum:num,waitingDate:today,reason:`${from}→${to}${to==='무료'?'('+sub+')':''} 전환`};
      p.fenceNum=num;
    }
  } else if(fromHasFenceActual && toHasFence){
    if(DATA.fences[num]) DATA.fences[num].type=to;
    else DATA.fences[num]={num,type:to,status:'미지정',padNum:num};
  }

  addHistory('전환',`${from}→${to}${to==='무료'?'('+sub+')':''}`,num+' · '+reason,null,num);
  closeModal();
  const msg = (fromHasFenceActual&&!toHasFence)?`전환 완료 — 펜스는 삭제 대기로 이동. 모바일펜스에서 삭제 후 체크하세요.`
            : (!fromHasFenceActual&&toHasFence)?`전환 완료 — 펜스는 "새 계정 생성 대기"로 등록. 모바일펜스에서 생성 후 체크하세요.`
            : `${num} 전환 완료`;
  toast(msg,'success');
  showPage(currentPage);
}

/* 여유 펜스 재활용 후 마무리 처리 */
function _finishConvert(num,from,to,sub,reason,fromHasFenceActual,toHasFence,mode,oldKey){
  addHistory('전환',`${from}→${to}${to==='무료'?'('+sub+')':''}`,num+' · '+reason+(mode==='reuse'?` · 여유 펜스 ${oldKey} 재활용`:''),null,num);
  closeModal();
  const msg = mode==='reuse'
    ? `✓ 전환 완료 — 여유 펜스 ${oldKey}를 ${num}으로 재활용 (모바일펜스에서도 번호 수정 필요)`
    : `전환 완료 — "새 계정 생성 대기"로 등록됨. 모바일펜스에서 계정 생성 후 체크하세요.`;
  toast(msg,'success');
  showPage(currentPage);
}

  const storage=Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='보관');
  const staffUse=Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='직원사용').length;
  const freeBroken=Object.values(DATA.pads).filter(p=>p.type==='무료'&&(p.status==='파손'||p.status==='고장')).length;
  return `

        ${canConvert()?`<button class="btn btn-warning" onclick="openConvertModal('무료','')">⇄ 전환</button>`:''}

      <div class="dash-card ok"><div class="dash-label">보관 (대여 가능)</div><div class="dash-main"><span class="dash-num">${s.freeStorage}</span><span class="dash-unit">대</span></div>${staffUse>0?`<div class="dash-sub" style="font-size:11px;color:var(--text-light)">참고: 직원용 ${staffUse}대 (고정·대여 대상 아님)</div>`:''}</div>
      <div class="dash-card"><div class="dash-label">대여중</div><div class="dash-main"><span class="dash-num">${s.freeActive}</span><span class="dash-unit">대</span></div></div>
      <div class="dash-card ${s.freeOverdue>0?'urgent':''}"><div class="dash-label">미반납</div><div class="dash-main"><span class="dash-num">${s.freeOverdue}</span><span class="dash-unit">건</span></div><div class="dash-sub">반납 예정일 지남</div></div>
      <div class="dash-card ${freeBroken>0?'warn':''}" onclick="gotoInventory('broken')"><div class="dash-label">파손·고장</div><div class="dash-main"><span class="dash-num">${freeBroken}</span><span class="dash-unit">대</span></div><div class="dash-sub">재고 → 파손·고장 탭</div></div>
    </div>

/* 무료대여 시간 표시 헬퍼 */
function fr_fmtStart(p){
  if(p.startAt){
    const d = new Date(p.startAt);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${mm}-${dd} ${hh}:${mi}`;
  }
  return p.startDate || '—';
}
function fr_fmtDue(p){
  if(p.startAt && p.duration){
    const d = new Date(new Date(p.startAt).getTime() + p.duration*60*1000);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${mm}-${dd} ${hh}:${mi}`;
  }
  return p.endDate || '—';
}
function fr_fmtDuration(p){
  if(!p.duration) return '—';
  const m = p.duration;
  if(m<60) return m+'분';
  const h = Math.floor(m/60);
  const r = m%60;
  return h+'시간'+(r?' '+r+'분':'');
}
function fr_remainLabel(p){
  if(!p.duration || !p.startAt) return '대여중';
  const due = new Date(p.startAt).getTime() + p.duration*60*1000;
  const diffMs = due - Date.now();
  if(diffMs <= 0) return '미반납';
  const mins = Math.ceil(diffMs/60000);
  if(mins<60) return '남은 '+mins+'분';
  const hrs = Math.floor(mins/60);
  return '남은 '+hrs+'시간'+(mins%60?' '+(mins%60)+'분':'');
}
function fr_saveNew(){
  const name=document.getElementById('fr_name').value.trim();
  const num=document.getElementById('fr_pad').value;
  const start=document.getElementById('fr_start').value;
  const end=document.getElementById('fr_end').value;
  const reason=document.getElementById('fr_reason').value.trim();
  const duration=document.getElementById('fr_duration')?.value||'';
  if(!name){toast('학생 이름 필수','error');return}
  if(!num){toast('패드 선택','error');return}
  if(!end){toast('반납 예정일 필수','error');return}
  const p=DATA.pads[num];
  const nowIso = new Date().toISOString();
  p.status='대여중';p.studentId=name;p.startDate=start||todayStr();p.endDate=end;p.reason=reason;p.assignedBy=currentUser;
  p.startAt=nowIso;
  if(duration) p.duration=parseInt(duration);
  if(!DATA.students[name]) DATA.students[name]={id:name,name,status:'재원',pads:[]};
  const padEntry={type:'무료',num,model:p.model,startDate:p.startDate,endDate:end,reason,startAt:nowIso};
  if(duration) padEntry.duration=parseInt(duration);
  DATA.students[name].pads.push(padEntry);
  const dLabel = duration ? ` (사용 ${duration<60?duration+'분':(duration/60)+'시간'+(duration%60?' '+(duration%60)+'분':'')})` : '';
  addHistory('무료대여','대여',name+' · '+num+dLabel,name,num);
  closeModal();toast('대여 등록 완료','success');refreshCurrentPage();
}

function fr_doExtend(num){
  const newEnd=document.getElementById('fr_extEnd').value;
  const reason=document.getElementById('fr_extReason').value.trim();
  const memo=document.getElementById('fr_extMemo').value.trim();
  const newDurVal=document.getElementById('fr_extDuration')?.value;
  if(!newEnd){toast('새 반납일 필수','error');return}
  if(!reason){toast('사유 필수','error');return}
  if(!newDurVal){toast('사용 시간 선택 필수','error');return}
  const p=DATA.pads[num];
  if(!p.extensions) p.extensions=[];
  const extRecord={date:todayStr(),prevEndDate:p.endDate,newEndDate:newEnd,reason,memo,by:currentUser};
  // 새 사용 시간으로 재설정 (연장 시점부터 시작)
  const m = parseInt(newDurVal);
  p.duration = m;
  p.startAt = new Date().toISOString();
  extRecord.durationChange = m+'분 재설정';
  const durMsg = ` · 사용시간 ${m<60?m+'분':(m/60)+'시간'+(m%60?' '+(m%60)+'분':'')} 재설정`;
  p.extensions.push(extRecord);
  p.endDate=newEnd;
  const st=DATA.students[p.studentId];
  if(st){
    const pp=st.pads.find(x=>x.type==='무료'&&x.num===num);
    if(pp){
      pp.endDate=newEnd;
      pp.duration=m;
      pp.startAt=p.startAt;
    }
  }
  addHistory('무료대여','연장',p.studentId+' · '+num+' → '+newEnd+' ('+reason+')'+durMsg,p.studentId,num);
  closeModal();toast('연장 완료 — 대여중으로 복귀','success');refreshCurrentPage();
}

function renderFreeHistory(){
  const F=STATE.free;
  const active=Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='대여중').map(p=>({padNum:p.num,studentId:p.studentId,startDate:p.startDate,endDate:p.endDate,returnDate:null,reason:p.reason,returnMemo:'',assignedBy:p.assignedBy,returnedBy:null,status:isOverdueFree(p)?'미반납':'대여중',extensions:p.extensions}));
  let all=active.concat(DATA.freeHistory);
  if(F.q){const q=F.q.toLowerCase();all=all.filter(h=>h.studentId?.toLowerCase().includes(q)||h.padNum.toLowerCase().includes(q)||h.assignedBy?.toLowerCase().includes(q)||h.returnedBy?.toLowerCase().includes(q))}
  if(F.status) all=all.filter(h=>h.status===F.status);
  if(F.cls){all=all.filter(h=>{const st=DATA.students[h.studentId];return st && (st.class||'정규')===F.cls})}
  if(F.from||F.to) all=all.filter(h=>rangeOverlap(h.startDate,h.returnDate||h.endDate,F.from,F.to));

  // 전체 보기 시 (상태 필터 없음 + 검색어 없음 + 기간 없음): 미반납/대여중 전부 + 반납은 오늘만

    const today = todayStr();
    all = all.filter(h => h.status!=='반납' || h.returnDate===today);
  }

  const order={'미반납':0,'대여중':1,'반납':2};
  all.sort((a,b)=>{const d=order[a.status]-order[b.status];if(d!==0) return d;return (b.returnDate||b.startDate||'').localeCompare(a.returnDate||a.startDate||'')});

      <div class="filter-field"><label>상태</label><select onchange="STATE.free.status=this.value;showPage('freeRent')"><option value="" ${!F.status?'selected':''}>전체</option><option value="미반납" ${F.status==='미반납'?'selected':''}>미반납</option><option value="대여중" ${F.status==='대여중'?'selected':''}>대여중</option><option value="반납" ${F.status==='반납'?'selected':''}>반납</option></select></div>
      <div class="filter-field"><label>from</label><input type="date" value="${F.from||''}" onchange="STATE.free.from=this.value;showPage('freeRent')"></div>
      <div class="filter-field"><label>to</label><input type="date" value="${F.to||''}" onchange="STATE.free.to=this.value;showPage('freeRent')"></div>
      <div class="filter-field"><label>&nbsp;</label><button class="btn btn-excel btn-sm" onclick="dlFreeHist()">엑셀</button></div>
      <div class="filter-field"><label>&nbsp;</label><button class="btn btn-sm" onclick="STATE.free.q='';STATE.free.cls='';STATE.free.status='';STATE.free.from='';STATE.free.to='';showPage('freeRent')">초기화</button></div>
    </div>
    <table class="tbl"><thead><tr><th>상태</th><th>학생</th><th>패드</th><th>대여~반납</th><th>사유</th><th>담당(대여→반납)</th><th>메모</th></tr></thead><tbody>
      ${show.length?show.map(h=>`<tr>

        <td style="font-size:12px;color:var(--text-muted)">${h.returnMemo||'—'}</td>
      </tr>`).join(''):'<tr><td colspan="7" class="tbl-empty">이력 없음</td></tr>'}
    </tbody></table>
    ${all.length>F.limit?`<div class="load-more-wrap">총 ${all.length}건 중 ${show.length}건<br><button class="btn" onclick="STATE.free.limit+=20;showPage('freeRent')">더 보기</button></div>`:''}`;

function dlFreeHist(){
  const F=STATE.free;
  const active=Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='대여중').map(p=>({padNum:p.num,studentId:p.studentId,startDate:p.startDate,endDate:p.endDate,returnDate:null,reason:p.reason,returnMemo:'',assignedBy:p.assignedBy,returnedBy:null,status:isOverdueFree(p)?'미반납':'대여중'}));
  let all=active.concat(DATA.freeHistory);
  // 화면과 동일 필터링
  if(F.q){const q=F.q.toLowerCase();all=all.filter(h=>h.studentId?.toLowerCase().includes(q)||h.padNum.toLowerCase().includes(q)||h.assignedBy?.toLowerCase().includes(q)||h.returnedBy?.toLowerCase().includes(q))}
  if(F.status) all=all.filter(h=>h.status===F.status);
  if(F.cls){all=all.filter(h=>{const st=DATA.students[h.studentId];return st && (st.class||'정규')===F.cls})}
  if(F.from||F.to) all=all.filter(h=>rangeOverlap(h.startDate,h.returnDate||h.endDate,F.from,F.to));
  // 기본 보기 시 반납은 오늘만
  const isDefaultView = !F.status && !F.q && !F.from && !F.to && !F.cls;
  if(isDefaultView){
    const today = todayStr();
    all = all.filter(h => h.status!=='반납' || h.returnDate===today);
  }
  const rows=[['상태','학생','반','패드','대여일','반납예정','실제반납','사유','대여담당','반납담당','메모']];
  all.forEach(h=>{
    const st=DATA.students[h.studentId];
    rows.push([h.status,h.studentId,st?.class||'',h.padNum,h.startDate,h.endDate,h.returnDate||'',h.reason||'',h.assignedBy||'',h.returnedBy||'',h.returnMemo||'']);
  });
  downloadCSV('무료대여이력_'+todayStr()+'.csv',rows);
}

/* 펜스 부여 모달 - 펜스 없는 창고 패드에 펜스 할당 */
function openFenceAssignModal(padNum){
  const p=DATA.pads[padNum];
  if(!p){toast('패드 없음','error');return}
  if(p.fenceNum){toast('이미 펜스가 있습니다','error');return}
  const freeFences=Object.values(DATA.fences).filter(f=>f.status==='미지정'&&f.type===p.type);
  openModal(`
    <div class="modal-title">펜스 부여 — ${padNum}</div>
    <div class="modal-desc">
      창고에 있는 패드에 펜스를 부여합니다. 배부 전에 미리 펜스만 만들어둘 수 있어요.<br>
      <span style="color:var(--warning)">※ 모바일펜스 사이트에서도 실제 계정 작업이 필요합니다.</span>
    </div>
    <div class="form-row"><label>부여 방식<span class="req">*</span></label>
      <select id="fa_type" onchange="fa_toggle()">
        <option value="same">패드번호와 동일 (${padNum})</option>
        ${freeFences.length?`<option value="reuse">여유 펜스 재활용 (${freeFences.length}개 보유)</option>`:''}
        <option value="new">새 번호 직접 입력</option>
      </select>
    </div>
    <div class="form-row" id="fa_reuse_wrap" style="display:none">
      <label>재활용할 여유 펜스</label>
      <select id="fa_reuse">
        ${freeFences.map((f,i)=>`<option value="${f.num}">여유 #${i+1} (이전 ${f.num})</option>`).join('')}
      </select>
    </div>
    <div class="form-row" id="fa_new_wrap" style="display:none">
      <label>새 펜스 번호</label>
      <input id="fa_new" placeholder="예: 626">
    </div>
    <div class="box box-warn" style="padding:10px;font-size:12px;margin:10px 0">
      부여 완료 후 펜스는 <b>"사용대기"</b> 상태가 됩니다. 이후 해당 패드를 학생에게 배부하면 "사용중"으로 바뀝니다.
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="fa_save('${padNum}')">부여 실행</button>
    </div>
  `);
}
function fa_toggle(){
  const type=document.getElementById('fa_type').value;
  document.getElementById('fa_reuse_wrap').style.display=type==='reuse'?'block':'none';
  document.getElementById('fa_new_wrap').style.display=type==='new'?'block':'none';
}
function fa_save(padNum){
  const type=document.getElementById('fa_type').value;
  const p=DATA.pads[padNum];
  let fenceNum;
  if(type==='same') fenceNum=padNum;
  else if(type==='reuse'){fenceNum=document.getElementById('fa_reuse').value;if(!fenceNum){toast('여유 펜스 선택','error');return}}
  else{fenceNum=document.getElementById('fa_new').value.trim();if(!fenceNum){toast('새 번호 입력','error');return}}

  if(type==='reuse'){
    // 여유 펜스를 이 패드번호로 수정 (대표님 실무자 방식)
    const oldKey=fenceNum;
    delete DATA.fences[oldKey];
    DATA.fences[padNum]={num:padNum,type:p.type,status:'사용대기',padNum,matchedFrom:oldKey,matchedDate:todayStr(),matchedBy:currentUser};
    p.fenceNum=padNum;
    addHistory('펜스','부여(재활용)',`여유 #${oldKey} → ${padNum}`,null,padNum);
  } else {
    if(DATA.fences[fenceNum] && DATA.fences[fenceNum].status!=='미지정'){toast(`${fenceNum} 이미 사용 중`,'error');return}
    DATA.fences[fenceNum]={num:fenceNum,type:p.type,status:'사용대기',padNum,addedDate:todayStr(),addedBy:currentUser};
    p.fenceNum=fenceNum;
    addHistory('펜스','부여(신규)',`${padNum} ← 펜스 ${fenceNum}`,null,padNum);
  }
  closeModal();
  toast(`${padNum} 펜스 부여 완료 (${fenceNum})`,'success');
  showPage('inventory');
}

  const I=STATE.inventory;
  const current=Object.values(DATA.pads).filter(p=>p.broken);
  let all=current.map(p=>({src:'current',padNum:p.num,model:p.model,type:p.broken.type,memo:p.broken.memo,receiveDate:p.broken.receiveDate,receiveBy:p.broken.receiveBy,sendDate:p.broken.sendDate,sendBy:p.broken.sendBy,completeDate:null,completeBy:null,finalStatus:null,finalType:null,stage:p.broken.stage,prevStudent:p.broken.prevStudent}))
    .concat(DATA.brokenHistory.map(h=>({src:'history',padNum:h.padNum,model:'',type:h.type,memo:h.memo,receiveDate:h.receiveDate,receiveBy:h.receiveBy,sendDate:h.sendDate,sendBy:h.sendBy,completeDate:h.completeDate,completeBy:h.completeBy,finalStatus:h.finalStatus,finalType:h.finalType,stage:h.finalStatus==='폐기'?'폐기':'완료',prevStudent:h.prevStudent,_recent:h._recent})));
  // 공통 검색
  if(I.brokenQ){const q=I.brokenQ.toLowerCase();all=all.filter(h=>h.padNum.toLowerCase().includes(q)||h.prevStudent?.toLowerCase().includes(q)||h.receiveBy?.toLowerCase().includes(q))}
  // 탭별 필터
  if(I.brokenView==='history') all=all.filter(h=>h.stage==='완료'||h.stage==='폐기');
  else if(I.brokenView==='active'||!I.brokenView) all=all.filter(h=>h.stage==='AS대기'||h.stage==='AS진행중');
  // 단계 드롭다운 (탭별로 유효 값만 적용)
  if(I.brokenStage) all=all.filter(h=>h.stage===I.brokenStage);
  // 기간 필터 (사용자가 직접 설정한 경우만)
  if(I.brokenFrom||I.brokenTo){all=all.filter(h=>{if(dateInRange(h.receiveDate,I.brokenFrom,I.brokenTo)) return true;if(dateInRange(h.sendDate,I.brokenFrom,I.brokenTo)) return true;if(dateInRange(h.completeDate,I.brokenFrom,I.brokenTo)) return true;return false})}
  const order={'AS대기':0,'AS진행중':1,'완료':2,'폐기':3};
  all.sort((a,b)=>{const oa=order[a.stage]||9,ob=order[b.stage]||9;if(oa!==ob)return oa-ob;return (b._recent?1:0)-(a._recent?1:0)});
  const activeCnt=Object.values(DATA.pads).filter(p=>p.broken).length;
  const histCnt=DATA.brokenHistory.length;
  const waitCnt=current.filter(p=>p.broken.stage==='AS대기').length;
  const inProgCnt=current.filter(p=>p.broken.stage==='AS진행중').length;
  const compCnt=DATA.brokenHistory.filter(h=>h.finalStatus!=='폐기').length;
  const discardCnt=DATA.brokenHistory.filter(h=>h.finalStatus==='폐기').length;
  const curView = I.brokenView || 'active';
  // 탭별 단계 옵션
  let stageOpts = [];
  if(curView==='active') stageOpts = ['AS대기','AS진행중'];
  else if(curView==='history') stageOpts = ['완료','폐기'];
  else stageOpts = ['AS대기','AS진행중','완료','폐기'];
  return `
    <div class="dash-grid section" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:14px">
      <div class="dash-card ${waitCnt>0?'warn':''}" style="cursor:pointer" onclick="br_gotoActive('AS대기')"><div class="dash-label">AS 대기</div><div class="dash-main"><span class="dash-num">${waitCnt}</span><span class="dash-unit">대</span></div><div class="dash-sub">접수됨, 발송 전</div></div>
      <div class="dash-card ${inProgCnt>0?'warn':''}" style="cursor:pointer" onclick="br_gotoActive('AS진행중')"><div class="dash-label">AS 진행중</div><div class="dash-main"><span class="dash-num">${inProgCnt}</span><span class="dash-unit">대</span></div><div class="dash-sub">수리 대기</div></div>
      <div class="dash-card ok" style="cursor:pointer" onclick="br_gotoHistory('완료')"><div class="dash-label">수리 완료 (누적)</div><div class="dash-main"><span class="dash-num">${compCnt}</span><span class="dash-unit">대</span></div><div class="dash-sub">월납/무료 복귀</div></div>
      <div class="dash-card" style="cursor:pointer" onclick="br_gotoHistory('폐기')"><div class="dash-label">폐기 누적</div><div class="dash-main"><span class="dash-num">${discardCnt}</span><span class="dash-unit">대</span></div><div class="dash-sub">수리 불가</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
      <div class="tabs" style="margin:0">
        <div class="tab ${curView==='active'?'active':''}" onclick="STATE.inventory.brokenView='active';STATE.inventory.brokenStage='';STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';showPage('inventory')">진행 중 (${activeCnt})</div>
        <div class="tab ${curView==='history'?'active':''}" onclick="STATE.inventory.brokenView='history';STATE.inventory.brokenStage='';STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';showPage('inventory')">완료/폐기 이력 (${histCnt})</div>
        <div class="tab ${curView==='all'?'active':''}" onclick="STATE.inventory.brokenView='all';STATE.inventory.brokenStage='';STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';showPage('inventory')">전체 (${activeCnt+histCnt})</div>
      </div>
      <button class="btn btn-primary" onclick="br_openNew()">+ 파손·고장 접수</button>
    </div>
    ${curView==='history'?`
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <span style="font-size:12px;color:var(--text-muted);margin-right:6px">기간 프리셋:</span>
      <button class="btn btn-sm" onclick="br_setRange(7)">최근 7일</button>
      <button class="btn btn-sm" onclick="br_setRange(30)">최근 1개월</button>
      <button class="btn btn-sm" onclick="br_setRange(90)">최근 3개월</button>
      <button class="btn btn-sm" onclick="br_setRange(365)">최근 1년</button>
      <button class="btn btn-sm" onclick="br_setRange(0)">전체</button>
    </div>`:''}
    <div class="filter-bar" style="grid-template-columns:${curView!=='active'?'1.5fr 0.8fr 0.8fr 0.8fr auto':'1.5fr 0.8fr auto'}">
      <div class="filter-field"><label>검색 (패드/학생/담당자)</label><input value="${I.brokenQ||''}" oninput="STATE.inventory.brokenQ=this.value;_debouncedShowPage('inventory')"></div>
      <div class="filter-field"><label>단계</label><select onchange="STATE.inventory.brokenStage=this.value;showPage('inventory')"><option value="" ${!I.brokenStage?'selected':''}>전체</option>${stageOpts.map(s=>`<option value="${s}" ${I.brokenStage===s?'selected':''}>${s}</option>`).join('')}</select></div>
      ${curView!=='active'?`<div class="filter-field"><label>기간 from</label><input type="date" value="${I.brokenFrom||''}" onchange="STATE.inventory.brokenFrom=this.value;showPage('inventory')"></div>
      <div class="filter-field"><label>to</label><input type="date" value="${I.brokenTo||''}" onchange="STATE.inventory.brokenTo=this.value;showPage('inventory')"></div>`:''}
      <div class="filter-field"><label>&nbsp;</label><button class="btn btn-sm" onclick="STATE.inventory.brokenQ='';STATE.inventory.brokenStage='';STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';showPage('inventory')">초기화</button></div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${curView==='history'?`완료·폐기 이력 ${all.length}건`:curView==='active'?`진행 중 ${all.length}건`:`전체 ${all.length}건`}${I.brokenFrom?` · ${I.brokenFrom} ~ ${I.brokenTo||'오늘'}`:''}</div>
    <table class="tbl"><thead><tr><th>패드</th><th>이전학생</th><th>단계</th><th>사유</th><th>접수(담당)</th><th>발송(담당)</th><th>수령/폐기(담당)</th><th>최종</th><th>작업</th></tr></thead><tbody>
      ${all.length?all.map(h=>`<tr${h._recent?' style="background:#fef3c7;animation:flash 1s 2"':''}>
        <td><b>${h.padNum}</b>${h.model?` <span class="pad-model-small">${h.model}</span>`:''}${h._recent?' <span class="badge badge-yellow" style="font-size:10px">방금 처리됨</span>':''}</td>
        <td>${h.prevStudent||'—'}</td>
        <td><span class="chip chip-${h.stage==='AS대기'?'waiting':h.stage==='AS진행중'?'live':h.stage==='폐기'?'off':'ready'}">${h.stage}</span></td>
        <td style="font-size:12px;color:var(--text-muted);max-width:200px">${h.memo||'—'}</td>
        <td style="font-size:12px">${h.receiveDate||'—'}<br><span style="color:var(--text-muted)">${h.receiveBy||'—'}</span></td>
        <td style="font-size:12px">${h.sendDate||'—'}<br><span style="color:var(--text-muted)">${h.sendBy||'—'}</span></td>
        <td style="font-size:12px">${h.completeDate||'—'}<br><span style="color:var(--text-muted)">${h.completeBy||'—'}</span></td>
        <td style="font-size:12px">${h.finalStatus?h.finalType+' · '+h.finalStatus:'—'}</td>
        <td>${h.stage==='AS대기'?`<button class="btn btn-sm btn-primary" onclick="br_send('${h.padNum}')">발송</button>`:''}${h.stage==='AS진행중'?`<button class="btn btn-sm btn-success" onclick="br_complete('${h.padNum}')">수령/폐기</button>`:''}</td>
      </tr>`).join(''):'<tr><td colspan="9" class="tbl-empty">해당 없음</td></tr>'}
    </tbody></table>`;
}
function br_gotoActive(stage){
  STATE.inventory.tab='broken';
  STATE.inventory.brokenView='active';
  STATE.inventory.brokenStage=stage||'';
  STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';STATE.inventory.brokenQ='';
  showPage('inventory');
}
function br_gotoHistory(stage){
  STATE.inventory.tab='broken';
  STATE.inventory.brokenView='history';
  STATE.inventory.brokenStage=stage||'';
  STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';STATE.inventory.brokenQ='';
  showPage('inventory');
}
function br_setRange(days){
  if(days===0){STATE.inventory.brokenFrom='';STATE.inventory.brokenTo='';}
  else {
    const d=new Date();d.setDate(d.getDate()-days);
    STATE.inventory.brokenFrom=d.toISOString().slice(0,10);
    STATE.inventory.brokenTo='';
  }
  showPage('inventory');
}
function br_openNew(){
  const monthlyStock=Object.values(DATA.pads).filter(p=>p.type==='월납'&&p.status==='창고'&&!p.studentId);
  const freeStock=Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='보관'&&!p.studentId);
  openModal(`
    <div class="modal-title">파손·고장 접수</div>
    <div class="modal-desc">월납 반납 시 검수에서 파손 발견되는 경우가 대부분. 학생 직접 가져오는 경우는 즉시 재배부 옵션 사용.</div>
    <div class="form-row-inline">
      <div class="form-row"><label>패드번호<span class="req">*</span></label><input id="br_pad" placeholder="예: b17" oninput="br_padCheck()"><div class="form-hint" id="br_padHint">월납/무료만</div></div>
      <div class="form-row"><label>증상<span class="req">*</span></label>
        <select id="br_symptom">
          <option value="액정">액정 (금, 파손, 화면 이상)</option>
          <option value="전원">전원 안 켜짐</option>
          <option value="충전">충전 불가</option>
          <option value="기타">기타</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>접수일</label><input id="br_date" type="date" value="${todayStr()}"></div>
    <div class="form-row"><label>상세 메모</label><textarea id="br_memo" placeholder="예: 액정 오른쪽 상단 금, 터치 일부 안 됨"></textarea></div>

    <div class="box" style="background:#fafaf5;padding:14px;margin-top:14px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:700">
        <input type="checkbox" id="br_reassign" onchange="br_toggleReassign()" style="width:16px;height:16px">
        ⚡ 접수와 동시에 새 패드 즉시 재배부 (학생 패드 교체 상황)
      </label>
      <div id="br_reassignWrap" style="display:none;margin-top:12px">
        <div class="form-row-inline">
          <div class="form-row"><label>교체 종류<span class="req">*</span></label>
            <select id="br_newType" onchange="br_updateStockSelect()">
              <option value="월납">월납 대여 (창고 ${monthlyStock.length}대)</option>
              <option value="무료">무료 대여 (보관 ${freeStock.length}대)</option>
            </select>
          </div>
          <div class="form-row"><label>교체 패드번호<span class="req">*</span></label>
            <select id="br_newPad">
              ${monthlyStock.map(p=>`<option value="${p.num}">${p.num} (${p.model})</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="form-row" id="br_compMode_wrap" style="background:#fff;padding:10px;border-radius:6px">
          <label style="font-size:13px;font-weight:700">구성품 처리 방식 <span class="req">*</span></label>
          <div style="display:flex;flex-direction:column;gap:6px;margin-top:6px;font-size:13px">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="radio" name="br_compMode" value="keep" checked>
              <b>본체만 교체 (기존 구성품 그대로 유지)</b> <span style="color:var(--text-muted);font-size:11px">— 학생이 충전기/충전기선 집에서 계속 사용 중</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="radio" name="br_compMode" value="full">
              <b>전체 신규 대여</b> <span style="color:var(--text-muted);font-size:11px">— 구성품 모두 새로 대여해줄 때</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions"><button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="br_saveNew()">접수</button></div>`);
}
function br_updateStockSelect(){
  const type=document.getElementById('br_newType').value;
  const sel=document.getElementById('br_newPad');
  const list = type==='월납'
    ? Object.values(DATA.pads).filter(p=>p.type==='월납'&&p.status==='창고'&&!p.studentId)
    : Object.values(DATA.pads).filter(p=>p.type==='무료'&&p.status==='보관'&&!p.studentId);
  sel.innerHTML = list.map(p=>`<option value="${p.num}">${p.num} (${p.model})</option>`).join('') || '<option value="">재고 없음</option>';
}
function br_toggleReassign(){
  document.getElementById('br_reassignWrap').style.display=document.getElementById('br_reassign').checked?'block':'none';
}
function br_padCheck(){
  const num=document.getElementById('br_pad').value.trim();
  const h=document.getElementById('br_padHint');
  if(!num){h.textContent='월납/무료만';h.className='form-hint';return}
  const p=DATA.pads[num];
  if(!p){h.textContent='없음';h.className='form-hint err';return}
  if(p.type==='신규'){h.textContent='신규 불가 (학생 소유)';h.className='form-hint err';return}
  if(p.status==='파손'||p.status==='고장'){h.textContent='이미 '+p.status;h.className='form-hint err';return}
  h.textContent=`✓ ${p.type} · ${p.model} · ${p.status}${p.studentId?' ('+p.studentId+')':''}`;h.className='form-hint ok';
}
function br_saveNew(){
  const num=document.getElementById('br_pad').value.trim();
  const symptom=document.getElementById('br_symptom').value;
  const type='파손';  // 유형 분류 없음 - 모두 "파손"으로 통일
  const date=document.getElementById('br_date').value;
  const memo=document.getElementById('br_memo').value.trim();
  const reassign=document.getElementById('br_reassign').checked;
  // 증상 + 상세 메모 합쳐서 저장
  const combinedMemo = `[${symptom}] ${memo||''}`.trim();
  if(!num){toast('패드번호 필수','error');return}
  const p=DATA.pads[num];
  if(!p||p.type==='신규'||p.status==='파손'||p.status==='고장'){toast('접수 불가','error');return}
  const prevStudent=p.studentId||null;

  // 즉시 재배부 옵션 체크
  let newPadNum='';
  let newType='월납';
  let compMode='keep';
  if(reassign){
    if(!prevStudent){toast('이 패드에 학생이 없어서 재배부 불가','error');return}
    newPadNum=document.getElementById('br_newPad').value;
    newType=document.getElementById('br_newType').value;
    const modeEl=document.querySelector('input[name="br_compMode"]:checked');
    compMode=modeEl?modeEl.value:'keep';
    if(!newPadNum){toast('교체 패드 선택','error');return}
    const np=DATA.pads[newPadNum];
    if(!np){toast('교체 패드 없음','error');return}
    if(newType==='월납'&&np.status!=='창고'){toast('교체 패드 배부 불가 상태','error');return}
    if(newType==='무료'&&np.status!=='보관'){toast('교체 패드 배부 불가 상태','error');return}
  }

  // 파손 접수
  p.broken={type,receiveDate:date,receiveBy:currentUser,memo:combinedMemo,symptom,stage:'AS대기',prevStudent,originalStatus:p.status,originalType:p.type};
  p.status=type;
  // 펜스도 삭제대기로 (파손이니까)
  if(DATA.fences[num]){
    DATA.fences[num].status='삭제대기';
    DATA.fences[num].reason=`${type} 접수`;
    DATA.fences[num].waitingDate=date;
    delete DATA.fences[num].studentId;
  }

  // 학생에게서 이 패드 제거
  if(prevStudent&&DATA.students[prevStudent]) DATA.students[prevStudent].pads=DATA.students[prevStudent].pads.filter(pp=>pp.num!==num);
  delete p.studentId;

  // 즉시 재배부
  if(reassign && newPadNum){
    const np=DATA.pads[newPadNum];
    const fnum=newPadNum;
    // 기존 학생의 이전 패드에서 구성품 정보 가져오기
    const oldStudentPad = DATA.students[prevStudent]?.pads?.find(pp=>pp.num===num) || p.broken;
    // 참고: 학생에서 이미 패드 제거했으므로 p.broken에서 되찾기 힘듦. 대신 복사본 받아둬야 하는데 여기선 새로 생성
    // compMode에 따라 분기
    let comps, leased, leaseMemo;
    if(newType==='월납' && compMode==='keep'){
      // 본체만 교체: 기존 월납 구성품 유지 (새로 부여 X) - "본체(교체됨)"만 표기
      comps = (MODELS[np.model]||['본체','충전기']).concat(['파손확인']);
      leased = {};
      // 본체만 신규 대여, 나머지는 "유지"로 표시
      comps.forEach(c=>{
        leased[c] = (c==='본체' || c==='파손확인');
      });
      leaseMemo = `본체만 교체 (기존 ${num}의 구성품 유지 중)`;
    } else if(newType==='무료'){
      comps = (MODELS[np.model]||['본체','충전기']);
      leased = {};
      comps.forEach(c=>{leased[c]=true});
    } else {
      // 전체 신규 대여
      comps = (MODELS[np.model]||['본체','충전기']).concat(['파손확인']);
      leased = {};
      comps.forEach(c=>{leased[c]=true});
    }
    const returned={};
    comps.forEach(c=>{returned[c]={done:false,memos:[]}});

    // 패드 상태 업데이트
    if(newType==='월납'){
      np.status='대여중';
    } else {
      np.status='대여중';  // 무료도 대여중으로
    }
    np.studentId=prevStudent;np.fenceNum=fnum;np.assignedDate=date;np.assignedBy=currentUser;

    // 펜스 처리 (월납만 - 무료 대여는 펜스 있음)
    if(DATA.fences[fnum]){
      DATA.fences[fnum].status='사용중';
      DATA.fences[fnum].studentId=prevStudent;
    } else {
      DATA.fences[fnum]={num:fnum,type:newType,status:'사용중',padNum:newPadNum,studentId:prevStudent};
    }

    if(DATA.students[prevStudent]){
      const newPadObj={type:newType,num:newPadNum,model:np.model,fenceNum:fnum,assignedDate:date,assignedBy:currentUser,components:comps,leased,returned,leaseMemo,replacedFrom:num};
      if(newType==='무료'){

        newPadObj.reason=`${num} 파손 교체 (임시)`;
      }
      DATA.students[prevStudent].pads.push(newPadObj);
    }

    addHistory('파손·고장','접수+재배부',`${num} ${type} → ${prevStudent}에게 ${newPadNum} (${newType}) 교체 배부 · ${compMode==='keep'?'본체만':'전체구성품'}`,prevStudent,num);
    closeModal();
    STATE.inventory.tab='broken';
    STATE.inventory.brokenView='active';
    toast(`✓ ${num} 접수 + ${newPadNum}(${newType}) 즉시 재배부 완료`,'success');
  } else {
    addHistory('파손·고장','접수',num+' · '+type+(prevStudent?' (이전 '+prevStudent+')':'')+' · '+memo,prevStudent,num);
    closeModal();

    STATE.inventory.brokenView='active';
    toast('접수 완료','success');

  refreshCurrentPage();
}

function br_doComplete(num){
  const date=document.getElementById('br_compDate').value;
  const finalType=document.getElementById('br_finalType').value;
  const memo=document.getElementById('br_compMemo').value.trim();
  const p=DATA.pads[num];
  const b=p.broken;
  let finalStatus;
  if(finalType==='월납'){finalStatus='창고';p.type='월납';p.status='창고'}
  else if(finalType==='무료'){finalStatus='보관';p.type='무료';p.status='보관'}
  else{finalStatus='폐기'}
  const histEntry={id:'bh_'+Date.now(),padNum:num,type:b.type,memo:memo||b.memo,receiveDate:b.receiveDate,receiveBy:b.receiveBy,sendDate:b.sendDate,sendBy:b.sendBy,completeDate:date,completeBy:currentUser,finalStatus,finalType,prevStudent:b.prevStudent,_recent:true};
  DATA.brokenHistory.unshift(histEntry);
  // 3초 후 강조 플래그 제거
  setTimeout(()=>{delete histEntry._recent; if(currentPage==='inventory') showPage('inventory')},4000);

  if(finalType==='폐기'){
    delete DATA.pads[num];
    if(DATA.fences[num]){DATA.fences[num].status='삭제대기';DATA.fences[num].waitingDate=date;DATA.fences[num].reason='파손 폐기'}
    addHistory('파손·고장','폐기',num+' · '+memo,null,num);
    closeModal();
    // 이력 보기 모드로 자동 전환
    STATE.inventory.brokenView='history';
    toast(`✓ ${num} 폐기 완료 — 재고 −1, 펜스 삭제대기`,'success');
  }else{
    delete p.broken;
    addHistory('파손·고장','수령',num+' · '+finalType+' '+finalStatus,null,num);
    closeModal();
    STATE.inventory.brokenView='history';
    toast(`✓ ${num} 수령 완료 — ${finalType} ${finalStatus}으로 전환`,'success');
  }

}
function dlInvExcel(){
  const I=STATE.inventory;
  if(I.tab==='broken'){
    // 화면(renderInvBroken)과 동일하게 데이터 구성
    const current = Object.values(DATA.pads).filter(p=>p.broken);
    let all = current.map(p=>({padNum:p.num,model:p.model,type:p.broken.type,memo:p.broken.memo,receiveDate:p.broken.receiveDate,receiveBy:p.broken.receiveBy,sendDate:p.broken.sendDate,sendBy:p.broken.sendBy,completeDate:null,completeBy:null,finalStatus:null,finalType:null,stage:p.broken.stage,prevStudent:p.broken.prevStudent}))
      .concat((DATA.brokenHistory||[]).map(h=>({padNum:h.padNum,model:'',type:h.type,memo:h.memo,receiveDate:h.receiveDate,receiveBy:h.receiveBy,sendDate:h.sendDate,sendBy:h.sendBy,completeDate:h.completeDate,completeBy:h.completeBy,finalStatus:h.finalStatus,finalType:h.finalType,stage:h.finalStatus==='폐기'?'폐기':'완료',prevStudent:h.prevStudent})));
    // 공통 검색 (화면과 동일: padNum, prevStudent, receiveBy)
    if(I.brokenQ){const q=I.brokenQ.toLowerCase();all=all.filter(h=>h.padNum?.toLowerCase().includes(q)||h.prevStudent?.toLowerCase().includes(q)||h.receiveBy?.toLowerCase().includes(q))}
    // 탭별 필터 (brokenView)
    const curView = I.brokenView || 'active';
    if(curView==='active') all=all.filter(h=>h.stage==='AS대기'||h.stage==='AS진행중');
    else if(curView==='history') all=all.filter(h=>h.stage==='완료'||h.stage==='폐기');
    // 단계 드롭다운
    if(I.brokenStage) all=all.filter(h=>h.stage===I.brokenStage);
    // 기간 필터 (화면과 동일하게 receive/send/complete 셋 중 하나라도 들면 통과)
    if(I.brokenFrom||I.brokenTo){
      all=all.filter(h=>{
        if(dateInRange(h.receiveDate,I.brokenFrom,I.brokenTo)) return true;
        if(dateInRange(h.sendDate,I.brokenFrom,I.brokenTo)) return true;
        if(dateInRange(h.completeDate,I.brokenFrom,I.brokenTo)) return true;
        return false;
      });
    }
    // 화면과 동일 정렬
    const order={'AS대기':0,'AS진행중':1,'완료':2,'폐기':3};
    all.sort((a,b)=>(order[a.stage]||9)-(order[b.stage]||9));
    const rows=[['패드','종류','단계','접수일','접수담당','발송일','발송담당','수령일','수령담당','최종','이전학생','메모']];
    all.forEach(h=>{
      const finalCol = h.finalType||h.finalStatus ? (h.finalType||'')+' '+(h.finalStatus||'') : '';
      rows.push([h.padNum,h.type||'',h.stage||'',h.receiveDate||'',h.receiveBy||'',h.sendDate||'',h.sendBy||'',h.completeDate||'',h.completeBy||'',finalCol.trim(),h.prevStudent||'',h.memo||'']);
    });
    downloadCSV('파손고장_'+todayStr()+'.csv',rows);return;
  }
  // 재고 탭들 - 화면과 동일 필터
  let pads=Object.values(DATA.pads).filter(p=>p.status!=='파손'&&p.status!=='고장');
  if(I.tab==='new') pads=pads.filter(p=>p.type==='신규');
  else if(I.tab==='monthly') pads=pads.filter(p=>p.type==='월납');
  else if(I.tab==='free') pads=pads.filter(p=>p.type==='무료');
  if(I.q){const q=I.q.toLowerCase();pads=pads.filter(p=>p.num.toLowerCase().includes(q)||p.studentId?.toLowerCase().includes(q)||p.fenceNum?.toLowerCase().includes(q))}
  if(I.cls){pads=pads.filter(p=>{const st=DATA.students[p.studentId];return st && (st.class||'정규')===I.cls})}
  if(I.status) pads=pads.filter(p=>p.status===I.status);
  if(I.by){const q=I.by.toLowerCase();pads=pads.filter(p=>p.assignedBy?.toLowerCase().includes(q))}
  if(I.from||I.to) pads=pads.filter(p=>dateInRange(p.assignedDate,I.from,I.to));
  const rows=[['번호','기종','종류','상태','학생','반','펜스','배부일','담당']];
  pads.forEach(p=>{
    const st=DATA.students[p.studentId];
    rows.push([p.num,p.model||'',p.type,p.status,p.studentId||'',st?.class||'',p.fenceNum||'',p.assignedDate||'',p.assignedBy||'']);
  });
  downloadCSV('재고_'+I.tab+'_'+todayStr()+'.csv',rows);
}

/* ============ 펜스 관리 ============ */
function renderFences(){
  if(!canEdit()&&!canConvert()) return '<div class="box">권한이 없습니다.</div>';
  // 펜스없음 신규 패드 (펜스가 없어서 배부 불가)
  const padsNoFence = Object.values(DATA.pads).filter(p=>p.type==='신규'&&(p.status==='창고'||p.status==='미지정')&&!p.studentId&&!p.fenceNum&&!p._reservedWith);
  // 예약 중 (매칭 예약 or 삭제 예약)
  const reserved = Object.values(DATA.fences).filter(f=>f.status==='매칭예약'||f.status==='삭제예약');
  // 실제로 삭제해야 할 펜스 (매칭 재활용 불가능한 것만 → 삭제예약으로 간)
  // 여유 펜스 (번호 없음, 재활용 대기)
  const free = Object.values(DATA.fences).filter(f=>f.status==='미지정');
  const inUse = Object.values(DATA.fences).filter(f=>f.status==='사용중').length;

  return `
    <div class="page-header"><div><div class="page-title">펜스 관리 <span class="inline-stats">사용중 ${inUse} · 예약중 ${reserved.length} · 펜스없음 ${padsNoFence.length}대 · 여유 ${free.length}</span></div></div></div>
    <div class="tabs">
      <div class="tab ${STATE.fences.tab==='work'?'active':''}" onclick="STATE.fences.tab='work';showPage('fences')">작업 (${padsNoFence.length + reserved.length})</div>
      <div class="tab ${STATE.fences.tab==='free'?'active':''}" onclick="STATE.fences.tab='free';showPage('fences')">여유 펜스 (${free.length})</div>
      <div class="tab ${STATE.fences.tab==='history'?'active':''}" onclick="STATE.fences.tab='history';showPage('fences')">변경 이력</div>
      <div class="tab ${STATE.fences.tab==='all'?'active':''}" onclick="STATE.fences.tab='all';showPage('fences')">전체</div>
    </div>
    ${STATE.fences.tab==='work'||!STATE.fences.tab||STATE.fences.tab==='waiting'?renderFenceWork(padsNoFence, reserved, free):
      STATE.fences.tab==='free'?renderFenceFreeList(free):
      STATE.fences.tab==='history'?renderFenceHistory():renderFenceAll()}`;
}

// 매칭 예약 팝업 (여유 펜스 선택)
function fence_openMatchModal(padNum){
  const p=DATA.pads[padNum];
  if(!p){toast('패드 없음','error');return}
  const free=Object.values(DATA.fences).filter(f=>f.status==='미지정');
  if(!free.length){toast('여유 펜스가 없습니다','error');return}
  const options=free.map((f,i)=>{
    const prev=f.prevNum||(f.num&&!f.num.startsWith('_free_')?f.num:'');
    return `<option value="${f.num}">여유 #${i+1}${prev?' (이전 '+prev+')':''}</option>`;
  }).join('');
  openModal(`
    <div class="modal-title">매칭 예약 — ${padNum}번 패드</div>
    <div class="form-row">
      <label>사용할 여유 펜스 선택</label>
      <select id="fm_freeKey">${options}</select>
    </div>
    <div class="box" style="background:#eff6ff;border:1px solid #bfdbfe;padding:12px;margin:10px 0;font-size:13px;line-height:1.6">
      📌 <b>다음 단계:</b> 모바일펜스 사이트에서 선택한 여유 펜스의 이전 번호를 <b>${padNum}</b>으로 변경<br>
      변경 후 돌아와서 <b>[완료]</b> 클릭
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="fence_doReserveMatch('${padNum}')">예약</button>
    </div>
  `);
}

function fence_doReserveMatch(padNum){
  const freeKey=document.getElementById('fm_freeKey').value;
  closeModal();
  setTimeout(()=>fence_reserveMatch(padNum, freeKey), 100);

function fence_doReserveDelete(deleteNum){
  closeModal();
  setTimeout(()=>{
    const f=DATA.fences[deleteNum];
    if(!f) return;
    f.status='삭제예약';
    f._reservedBy=currentUser;
    f._reservedAt=nowStr();
    addHistory('펜스','삭제예약',`${deleteNum} 삭제 예약`,null,null);
    toast('삭제 예약 완료','success');
    showPage('fences');
  }, 100);
}

function fence_doReserveDeleteOrMatch(deleteNum){
  const target=document.getElementById('fd_target').value;
  closeModal();
  setTimeout(()=>{
    if(target==='__delete__'){
      fence_doReserveDelete(deleteNum);
    } else {
      // target은 패드번호
      fence_reserveAsMatch(deleteNum, target);
    }
  }, 100);
}

// 매칭 예약: 여유 펜스(freeKey) → 신규 패드(padNum)로 매칭 예약
function fence_reserveMatch(padNum, freeKey){
  const p=DATA.pads[padNum];
  const f=DATA.fences[freeKey];
  if(!p||!f){toast('패드/펜스 없음','error');return}
  const prevNum = f.prevNum || (f.num && !f.num.startsWith('_free_') ? f.num : '');
  // 새 펜스 객체 생성 (목표 번호 기준, 예약 상태)
  DATA.fences[padNum] = {
    num: padNum,
    type: '신규',
    status: '매칭예약',
    padNum: padNum,
    _prevNum: prevNum,
    _prevKey: freeKey,
    _reservedBy: currentUser,
    _reservedAt: nowStr()
  };
  // 기존 여유 펜스 삭제
  delete DATA.fences[freeKey];
  // 패드에 예약 플래그
  p._reservedWith = padNum;
  addHistory('펜스','매칭예약',`여유${prevNum?' (이전 '+prevNum+')':''} → ${padNum} 예약`,null,padNum);
  toast('매칭 예약 완료','success');
  showPage('fences');
}

// 삭제대기 펜스를 특정 패드로 재활용 매칭 예약
function fence_reserveAsMatch(deleteNum, targetPadNum){
  const f=DATA.fences[deleteNum];
  const p=DATA.pads[targetPadNum];
  if(!f||!p){toast('펜스/패드 없음','error');return}
  const prevStudent=f.studentId;
  DATA.fences[targetPadNum] = {
    num: targetPadNum,
    type: '신규',
    status: '매칭예약',
    padNum: targetPadNum,
    _prevNum: deleteNum,
    _prevStudent: prevStudent,
    _reservedBy: currentUser,
    _reservedAt: nowStr()
  };
  delete DATA.fences[deleteNum];
  p._reservedWith = targetPadNum;
  addHistory('펜스','매칭예약(재활용)',`${deleteNum} → ${targetPadNum} 재활용 예약`,null,targetPadNum);
  toast(`재활용 예약. 모바일펜스에서 ${deleteNum} → ${targetPadNum} 변경`,'success');
  showPage('fences');
}

// 예약 완료 (모바일펜스 작업 끝난 후)
function fence_completeReservation(num){
  const f=DATA.fences[num];
  if(!f){toast('펜스 없음','error');return}
  if(f.status==='매칭예약'){
    ask('매칭 완료',`모바일펜스에서 <b>${f._prevNum}</b> → <b>${num}</b>으로 번호 변경을 완료했습니까?`,'완료','primary',()=>{
      const prevNum = f._prevNum;
      f.status='사용중';
      delete f._prevNum; delete f._prevStudent; delete f._reservedBy; delete f._reservedAt;
      // 패드의 _reservedWith 플래그 제거 + 펜스 번호 연결
      const p = DATA.pads[num];
      if(p){
        p.fenceNum = num;
        delete p._reservedWith;
      }
      addHistory('펜스','매칭완료',`${prevNum} → ${num}`,null,num);
      toast('매칭 완료','success');showPage('fences');
    });
  } else if(f.status==='삭제예약'){
    ask('삭제 완료',`모바일펜스에서 <b>${num}</b> 계정을 삭제했습니까?<br>완료 시 여유 펜스로 이동 (재활용 대기).`,'완료','primary',()=>{
      const prevNum = num;
      const freeKey = '_free_'+Date.now();
      // 새 여유 펜스 객체 생성 (번호 없음)
      DATA.fences[freeKey] = {
        num: freeKey,
        type: f.type||'신규',
        status: '미지정',
        prevNum: prevNum,
        deletedDate: todayStr(),
        deletedBy: currentUser
      };
      // 기존 번호 펜스 삭제
      delete DATA.fences[num];
      addHistory('펜스','삭제완료',`${prevNum} → 여유 풀`,null,null);
      toast('삭제 완료 → 여유 펜스로 이동','success');showPage('fences');
    });
  }
}

// 예약 취소
function fence_cancelReservation(num){
  const f=DATA.fences[num];
  if(!f){toast('펜스 없음','error');return}
  ask('예약 취소',`<b>${num}</b>의 예약을 취소합니다.<br>${f.status==='매칭예약'?'여유 펜스로 되돌아갑니다.':'삭제 대기 상태로 되돌아갑니다.'}`,'취소','warning',()=>{
    if(f.status==='매칭예약'){
      // 원래 여유 펜스 복구 (_prevKey 있으면 그걸로, 없으면 새 키 생성)
      const prevKey = f._prevKey || ('_free_'+Date.now());
      const prevNum = f._prevNum || '';
      DATA.fences[prevKey] = {
        num: prevKey,
        type: f.type||'신규',
        status: '미지정',
        prevNum: prevNum,
        deletedDate: todayStr(),
        deletedBy: f._reservedBy||currentUser
      };
      // 대상 패드의 _reservedWith 해제
      const p = DATA.pads[num];
      if(p) delete p._reservedWith;
      // 예약 펜스 객체 삭제
      delete DATA.fences[num];
      addHistory('펜스','매칭예약취소',`${num} 예약 취소 → 여유 복귀`,null,null);
    } else {
      // 삭제 예약 취소 → 다시 삭제대기로
      f.status='삭제대기';
      delete f._reservedBy; delete f._reservedAt;
      addHistory('펜스','삭제예약취소',`${num} 삭제 예약 취소`,null,null);
    }
    toast('예약 취소됨','success');showPage('fences');
  });
}

  if(!fenceKey){toast('여유 펜스 선택','error');return}

  if(!p||!f) return;
  ask('펜스 매칭 확인',`여유 펜스(이전 ${fenceKey})를 패드 <b>${padNum}</b> 에 매칭합니다.<br>→ 펜스 번호가 <b>${fenceKey} → ${padNum}</b> 로 수정되고 "사용중"으로 전환됩니다.<br>(모바일펜스 사이트에서도 계정 번호를 ${padNum}로 수정했는지 확인 후 진행)`,'매칭 실행','primary',()=>{

}
